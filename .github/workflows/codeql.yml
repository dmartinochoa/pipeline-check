name: CodeQL

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]
    # Skip CodeQL on PRs that don't touch executable code or the
    # workflows it would scan. The weekly cron below still catches
    # any drift on master regardless of what individual PRs touch.
    # ``workflow_dispatch`` below lets a maintainer satisfy the
    # ``code_scanning`` ruleset on docs-only PRs that would otherwise
    # never produce CodeQL results.
    paths-ignore:
      - "docs/**"
      - "bench/**"
      - "**/*.md"
      - "mkdocs.yml"
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # The CodeQL ``analyze`` step uploads results to the GitHub
      # code-scanning UI; scoped per-job so the write grant doesn't
      # bleed across the workflow.
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "actions"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          category: "/language:${{ matrix.language }}"
