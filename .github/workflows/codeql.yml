name: CodeQL

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]
  # Weekly scan catches drift in the CodeQL query database even when
  # no code has changed — the query set updates independently of us.
  schedule:
    - cron: "39 7 * * 1"  # Mondays at 07:39 UTC

permissions:
  contents: read
  security-events: write
  # Required by the CodeQL action to attach results to the run.
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          # ``security-and-quality`` is the broader query set — catches
          # style issues alongside security problems, which is what we
          # want on a tool whose codebase is small enough to absorb the
          # noise.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
