name: Docker publish

# Tag-driven: pushing a ``v*.*.*`` tag publishes the image alongside
# the PyPI release. The ``container-registry`` GitHub environment
# (configured under Settings -> Environments) is the human-approval
# gate before the GHCR / Docker Hub push runs, matching the
# ``production`` environment gate on the PyPI publish job.
#
# ``workflow_dispatch`` is kept so an operator can re-publish an
# image without re-tagging (e.g. to refresh the multi-arch build
# after a base-image security update) and so feature-branch preview
# builds can ship under their version+sha tags without polluting
# ``latest``.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write         # GHCR push via the default GITHUB_TOKEN
  id-token: write         # SLSA provenance / SBOM attestation OIDC
  security-events: write  # upload Docker Scout SARIF to the Security tab

# Serialize tag-driven image publishes so two near-simultaneous tag
# pushes (or a workflow_dispatch racing a tag) don't both try to push
# the same image tag. ``cancel-in-progress: false`` keeps the
# in-flight build alive, half-pushed multi-arch manifests are worse
# than waiting for the prior run to finish.
concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Environment binding gates the publish on the protection rules
    # configured under Settings -> Environments -> ``container-
    # registry`` (required reviewers, wait timer, branch policy). The
    # GHCR / Docker Hub push is the workflow's blast-radius surface;
    # the binding is what makes "manual operator decision" auditable
    # rather than just relying on workflow_dispatch. Mirrors the
    # control GHA-014 / GHA-030 enforce on every other deploy-shaped
    # job in this repo.
    environment: container-registry
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        # Used only to read the package version out of pyproject.toml
        # via ``tomllib``. The image itself is built inside the
        # Dockerfile's own python:3.12-slim base.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Read package version
        id: ver
        run: |
          v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # Emulator binaries that let buildx cross-compile the arm64
        # variant on the amd64 GitHub runner.
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Requires two repo secrets: DOCKERHUB_USERNAME and
        # DOCKERHUB_TOKEN. The token must be a Docker Hub access
        # token (Account Settings -> Security), not the account
        # password.
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute promotion tags + labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: |
            ghcr.io/dmartinochoa/pipeline-check
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pipeline-check
          # Three tag flavors per image: the package version, a
          # short-SHA pointer for traceability, and ``latest`` when
          # the workflow runs against the repo's default branch
          # (master). Non-default branches still publish the
          # version+sha pair, so preview builds from feature
          # branches don't pollute ``latest``.
          #
          # These tags are NOT applied at build time. They are only
          # attached to the manifest after Docker Scout has scanned
          # the quarantine digest below, so a failed scan never
          # leaves a publicly-visible release tag on either registry.
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=pipeline-check
            org.opencontainers.image.description=CI/CD security posture scanner
            org.opencontainers.image.source=https://github.com/dmartinochoa/pipeline-check
            org.opencontainers.image.licenses=MIT

      - name: Build and push to quarantine tag
        # Build the multi-arch image and push it to GHCR under a
        # single, throwaway ``scan-${sha}`` tag. The user-facing
        # tags (``:latest``, ``:${version}``, ``:sha-${short}``) and
        # the Docker Hub mirror are deliberately NOT created here.
        # They are only attached by the promote step after Scout
        # signs off on the digest. ``--load`` is not an option for
        # multi-arch (the local daemon only holds one platform), so
        # the only place a multi-arch manifest can live for Scout to
        # scan is the registry, hence the quarantine tag.
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/dmartinochoa/pipeline-check:scan-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          # SLSA build provenance and an SBOM attached to the image
          # manifest. Keeps parity with release.yml's CycloneDX SBOM
          # for the wheel. Both attestations are bound to the digest,
          # so they follow the manifest when ``imagetools create``
          # adds the promoted tags below.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Docker Scout
        # Vulnerability scan against the quarantine digest. ``exit-
        # code: true`` + ``only-severities: critical,high`` fails the
        # workflow on any new critical or high CVE BEFORE the promote
        # step runs, so a vulnerable image never escapes the
        # quarantine tag. Mirrors release.yml's ``pip-audit
        # --strict`` posture for the wheel. SARIF output is uploaded
        # in the next step so findings land on the repo's Security
        # tab even when this step fails the job. Scout authenticates
        # via the Docker Hub login already performed above; no
        # separate secret is needed.
        id: scout
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3  # v1.20.4
        with:
          command: cves
          image: ghcr.io/dmartinochoa/pipeline-check@${{ steps.build.outputs.digest }}
          only-severities: critical,high
          exit-code: true
          sarif-file: scout-cves.sarif
          summary: true

      - name: Upload Scout SARIF
        # Always upload, even if the Scout step exited non-zero, so a
        # failed build still surfaces its findings on the Security tab
        # rather than vanishing with the job.
        if: always() && hashFiles('scout-cves.sarif') != ''
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: scout-cves.sarif
          category: docker-scout

      - name: Promote scanned digest to release tags
        # Only runs when every previous step (including Scout)
        # succeeded. ``docker buildx imagetools create`` attaches new
        # tags to the already-scanned manifest without rebuilding,
        # and the SBOM + provenance attestations follow because they
        # are bound to the digest, not the source tag. This is the
        # step that actually publishes ``:latest`` / ``:${version}``
        # / ``:sha-${short}`` to GHCR and Docker Hub.
        #
        # The quarantine ``scan-${sha}`` tag on GHCR is intentionally
        # left in place. It points at the same scanned digest, costs
        # nothing storage-wise (shared layers), and provides an
        # audit trail of every digest that passed Scout. Trim it via
        # GHCR's retention policy if it ever becomes noisy.
        env:
          SRC: ghcr.io/dmartinochoa/pipeline-check@${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "promoting $SRC -> $tag"
            docker buildx imagetools create --tag "$tag" "$SRC"
          done <<< "$TAGS"
