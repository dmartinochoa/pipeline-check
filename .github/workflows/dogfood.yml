name: Dogfood

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read
  security-events: write

jobs:
  scan-self:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install pipeline_check
        run: |
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Scan this repo's GitHub Actions workflows (terminal)
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output terminal

      - name: Scan and emit SARIF
        if: always()
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output sarif \
            --output-file pipeline-check.sarif

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          sarif_file: pipeline-check.sarif
          category: pipeline-check-dogfood

      - name: Gate on findings (non-blocking)
        continue-on-error: true
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --fail-on high \
            --output json \
            > pipeline-check.json
