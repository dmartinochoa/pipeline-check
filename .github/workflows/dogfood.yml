name: Dogfood

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read
  security-events: write

jobs:
  scan-self:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Eat our own dogfood: GHA-002 covers checkout steps that
          # leave the GITHUB_TOKEN persisted in the git config. The
          # dogfood workflow itself must pass the tool it runs.
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install pipeline_check
        run: |
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Scan this repo's GitHub Actions workflows (terminal)
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output terminal

      - name: Scan and emit SARIF
        # Always run so the SARIF upload below still lands even if
        # the "terminal" scan step above happens to fail for reasons
        # unrelated to findings (e.g. pip install flake).
        if: always()
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output sarif \
            --output-file pipeline-check.sarif

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: pipeline-check.sarif
          category: pipeline-check-dogfood

      - name: Gate on findings (non-blocking)
        # Kept non-blocking deliberately: the SARIF upload above is
        # the real signal (it shows up as a PR annotation), and a
        # hard fail here would block master merges the moment a new
        # HIGH finding lands, which is hostile to the team's
        # incremental-hardening workflow. Remove `continue-on-error`
        # once the failing-finding inventory reaches zero.
        continue-on-error: true
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --fail-on high \
            --output json \
            > pipeline-check.json
