name: Dogfood

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan-self:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Needed by ``github/codeql-action/upload-sarif`` in the
      # ``Upload SARIF`` step below. Scoped per-job so the elevated
      # write grant doesn't bleed across the workflow. Previously
      # this lived under ``concurrency:`` where it had no effect, so
      # the SARIF upload ran without the scope it needed and the
      # dogfood findings never reached the GitHub code-scanning UI.
      # CodeRabbit caught it on PR #93.
      security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Eat our own dogfood: GHA-002 covers checkout steps that
          # leave the GITHUB_TOKEN persisted in the git config. The
          # dogfood workflow itself must pass the tool it runs.
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install pipeline_check
        run: |
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Scan this repo's GitHub Actions workflows (terminal)
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output terminal

      - name: Scan and emit SARIF
        # Always run so the SARIF upload below still lands even if
        # the "terminal" scan step above happens to fail for reasons
        # unrelated to findings (e.g. pip install flake).
        if: always()
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output sarif \
            --output-file pipeline-check.sarif

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: pipeline-check.sarif
          category: pipeline-check-dogfood

      - name: Gate on findings (non-blocking)
        # Kept non-blocking deliberately: the SARIF upload above is
        # the real signal (it shows up as a PR annotation), and a
        # hard fail here would block master merges the moment a new
        # HIGH finding lands, which is hostile to the team's
        # incremental-hardening workflow. Remove `continue-on-error`
        # once the failing-finding inventory reaches zero.
        continue-on-error: true
        run: |
          pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --fail-on high \
            --output json \
            > pipeline-check.json

  scan-self-published:
    # Second dogfood pass: run the actually-published composite action
    # at its latest release tag, not the in-tree source. Catches
    # regressions where the bundled action.yml diverges from what users
    # get from the Marketplace. Master-only because the published
    # release necessarily lags rules merged on `dev`.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # SARIF upload below needs ``security-events: write``. Scoped
      # per-job so the elevated grant doesn't bleed across the
      # workflow.
      security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: pipeline-check (published, post-1.0.1 SHA-pin fix)
        # Pinned to ``8ba0b9e`` (the SHA-pin-composites merge commit
        # on master) rather than the latest release tag because v1.0.1
        # was cut before the SHA-pin policy fix landed and its
        # composite ``action.yml`` still references ``setup-python@v5``
        # / ``upload-sarif@v3`` by tag, which the org's "actions must
        # be pinned to a full-length commit SHA" policy refuses to
        # run. Bump this back to a release tag once a v1.0.2+ (or
        # whatever cuts after) is published.
        uses: dmartinochoa/pipeline-check@1ad1c6751187687ff7a89ddbbabfb1eac4515f68  # post-v1.0.1 SHA-pin fix
        with:
          pipeline: github
          path: .github/workflows
          fail-on: ''  # non-blocking, matches scan-self
          upload-sarif: 'false'  # uploaded explicitly below with a distinct category

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: pipeline-check.sarif
          category: pipeline-check-dogfood-published
