name: Publish to PyPI

# Manual-only. The auto-publish-on-tag trigger was removed because
# release.yml is the canonical release workflow; it builds on tag
# push (with a version-vs-wheel guard), then gates the PyPI publish
# behind a workflow_dispatch input. This workflow stays as a
# fallback path for the case where you've already got artifacts
# you want to push to PyPI without re-running release.yml's full
# build chain.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify pyproject version is publish-worthy
        # Defense-in-depth check for the case where this fallback
        # workflow is dispatched after a release.yml run failed. The
        # version in pyproject.toml MUST match the most recent
        # ``v*.*.*`` tag, otherwise we'd publish stale content.
        run: |
          PYPROJECT_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          WHEEL=$(ls dist/*.whl)
          if ! echo "$WHEEL" | grep -q "$PYPROJECT_VER"; then
            echo "Built wheel $WHEEL does not match pyproject version $PYPROJECT_VER"
            exit 1
          fi
          echo "Building $PYPROJECT_VER from $WHEEL"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi        # must match PyPI's trusted publisher config
    permissions:
      id-token: write        # required for OIDC
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true  # PEP 740 provenance attestations
