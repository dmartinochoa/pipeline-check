name: Python application

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # Windows smoke check on the version most dev laptops run.
          # Path-handling bugs in diff.py / autofix.py have a real
          # history of surfacing only on Windows, so run the suite at
          # least once per push there. macOS is omitted — it shares
          # POSIX path semantics with Linux and the marginal coverage
          # didn't justify the runner cost.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        # ``requirements-dev.txt`` was generated by pip-compile on a
        # Python newer than 3.10. pytest 9 conditionally pulls in
        # ``tomli`` and ``exceptiongroup`` on 3.10, and those
        # transitive deps aren't in the hash-locked file, so the
        # ``--require-hashes`` install fails on 3.10. Until the
        # lockfile is regenerated on a 3.10 interpreter, fall back to
        # an unpinned install of ``requirements-dev.in`` for the 3.10
        # matrix row only. 3.11 / 3.12 / 3.13 keep the hash-locked
        # supply-chain guarantee.
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.python-version }}" = "3.10" ]; then
            pip install -r requirements-dev.in
          else
            pip install --require-hashes -r requirements-dev.txt
          fi
          pip install -e .
        shell: bash

      - name: Lint with ruff
        # ruff is hash-pinned in requirements-dev.txt; the install step
        # above already supplied it. Don't re-install here unpinned.
        run: ruff check pipeline_check/ tests/

      - name: Type check with mypy
        # All nine ``mypy --strict`` flags are enabled in
        # ``pyproject.toml``. The two narrow per-module overrides
        # (boto3-leaning AWS modules + ``yaml.SafeLoader`` subclasses)
        # are documented in the same block. mypy is hash-pinned via
        # requirements-dev.txt, so the install step above provides it.
        run: mypy pipeline_check/

      - name: Test with pytest
        # --cov-fail-under gates the build on coverage regressions. Bump
        # this floor (never lower it) as the suite grows.
        run: |
          pytest --cov=pipeline_check --cov-report=term-missing --cov-fail-under=90
