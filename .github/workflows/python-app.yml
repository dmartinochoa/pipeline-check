name: Python application

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # 3.10 is supported by pyproject.toml (``requires-python = ">=3.10"``)
        # but excluded from the hash-locked CI install: pytest 9 pulls
        # in ``exceptiongroup``/``tomli`` conditionally on 3.10, and
        # the pip-compile that produced requirements-dev.txt ran on a
        # newer Python so those transitive deps aren't in the lock
        # file. Re-add 3.10 here once requirements-dev.txt is
        # regenerated with ``pip-compile`` on Python 3.10.
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # Windows smoke check on the version most dev laptops run.
          # Path-handling bugs in diff.py / autofix.py have a real
          # history of surfacing only on Windows, so run the suite at
          # least once per push there. macOS is omitted — it shares
          # POSIX path semantics with Linux and the marginal coverage
          # didn't justify the runner cost.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check pipeline_check/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy pipeline_check/ --ignore-missing-imports
        continue-on-error: true

      - name: Test with pytest
        # --cov-fail-under gates the build on coverage regressions. Bump
        # this floor (never lower it) as the suite grows.
        run: |
          pytest --cov=pipeline_check --cov-report=term-missing --cov-fail-under=90
