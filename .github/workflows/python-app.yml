name: Python application

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]
    # Skip the suite on PRs that don't touch executable code, tests,
    # the lockfile, or this workflow itself. Docs / bench changes are
    # covered by ``docs.yml`` (paths-gated) and don't need pytest.
    paths-ignore:
      - "docs/**"
      - "bench/**"
      - "**/*.md"
      - "mkdocs.yml"

permissions:
  contents: read

# Cancel an in-flight PR run when a new commit lands on the same PR.
# Master pushes keep the standard "don't cancel" posture so a green
# build stays green even if a follow-up lands quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Lint and mypy are invariant across the test matrix — running them
  # 4x (3.11 / 3.12 / 3.13 / windows-3.12) only delays PR feedback.
  # They both run against 3.12 once, in parallel with the pytest jobs.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Lint with ruff
        # ruff is hash-pinned in requirements-dev.txt.
        run: ruff check pipeline_check/ tests/

  # Dependency vulnerability scan on every PR. ``release.yml`` runs the
  # same check at tag time as a publish gate; this job catches a
  # vulnerable transitive bump the moment it lands on ``dev`` rather
  # than weeks later at release. Runs against the hash-locked runtime
  # lockfile (``requirements.txt``), not the dev one, so the audit
  # reflects what users actually install.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Vulnerability scan with pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit --requirement requirements.txt --strict

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Type check with mypy
        # All nine ``mypy --strict`` flags are enabled in
        # ``pyproject.toml``. The two narrow per-module overrides
        # (boto3-leaning AWS modules + ``yaml.SafeLoader`` subclasses)
        # are documented in the same block.
        run: mypy pipeline_check/

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Floor matches ``requires-python`` in ``pyproject.toml``
        # (3.11). 3.10 was dropped because the hash-locked install
        # didn't resolve on 3.10 (pytest 9 conditionally pulls
        # ``tomli`` / ``exceptiongroup``, which the newer-interpreter
        # ``pip-compile`` that produced ``requirements-dev.txt``
        # didn't bake in), and shipping a wheel for an untested
        # interpreter is a supply-chain footgun.
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # Windows smoke check on the version most dev laptops run.
          # Path-handling bugs in diff.py / autofix.py have a real
          # history of surfacing only on Windows, so run the suite at
          # least once per push there. macOS is omitted — it shares
          # POSIX path semantics with Linux and the marginal coverage
          # didn't justify the runner cost.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Test with pytest
        # --cov-fail-under gates the build on coverage regressions. Bump
        # this floor (never lower it) as the suite grows.
        # test_fleet.py is excluded here and runs in its own job below
        # because it spawns subprocesses and takes several minutes.
        run: |
          pytest --ignore=tests/test_fleet.py --cov=pipeline_check --cov-report=term-missing --cov-fail-under=90

  test-fleet:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Fleet tests
        run: |
          pytest tests/test_fleet.py -v
