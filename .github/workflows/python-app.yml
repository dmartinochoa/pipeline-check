name: Python application

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master", "dev"]
    # Skip the suite on PRs that don't touch executable code, tests,
    # the lockfile, or this workflow itself. Docs / bench changes are
    # covered by ``docs.yml`` (paths-gated) and don't need pytest.
    paths-ignore:
      - "docs/**"
      - "bench/**"
      - "**/*.md"
      - "mkdocs.yml"

permissions:
  contents: read

# Cancel an in-flight PR run when a new commit lands on the same PR.
# Master pushes keep the standard "don't cancel" posture so a green
# build stays green even if a follow-up lands quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Lint and mypy are invariant across the test matrix — running them
  # 4x (3.11 / 3.12 / 3.13 / windows-3.12) only delays PR feedback.
  # They both run against 3.12 once, in parallel with the pytest jobs.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Lint with ruff
        # ruff is hash-pinned in requirements-dev.txt.
        run: ruff check pipeline_check/ tests/

  # Dependency vulnerability scan on every PR. ``release.yml`` runs the
  # same check at tag time as a publish gate; this job catches a
  # vulnerable transitive bump the moment it lands on ``dev`` rather
  # than weeks later at release. Runs against the hash-locked runtime
  # lockfile (``requirements.txt``), not the dev one, so the audit
  # reflects what users actually install.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Vulnerability scan with pip-audit
        run: |
          python -m pip install --require-hashes -r requirements-ci.txt
          pip-audit --requirement requirements.txt --strict

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - name: Type check with mypy
        # All nine ``mypy --strict`` flags are enabled in
        # ``pyproject.toml``. The two narrow per-module overrides
        # (boto3-leaning AWS modules + ``yaml.SafeLoader`` subclasses)
        # are documented in the same block.
        run: mypy pipeline_check/

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
        include:
          # Full version matrix only on master merges. PRs run 3.12
          # only (with xdist parallelism) so feedback arrives fast.
          # The master push still covers 3.11, 3.13, and 3.14 for compat.
          - os: ubuntu-latest
            python-version: "3.11"
            master-only: true
          - os: ubuntu-latest
            python-version: "3.13"
            master-only: true
          - os: ubuntu-latest
            python-version: "3.14"
            master-only: true
          # Windows smoke check on the version most dev laptops run.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - if: ${{ !matrix.master-only || github.event_name == 'push' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - if: ${{ !matrix.master-only || github.event_name == 'push' }}
        name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - if: ${{ !matrix.master-only || github.event_name == 'push' }}
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install -e .

      - if: ${{ !matrix.master-only || github.event_name == 'push' }}
        name: Test with pytest
        # ``shell: bash`` (git-bash on the Windows runner too) so the two
        # invocations below share ``set -eo pipefail`` semantics: a failure
        # in the main run fails the step instead of being masked by the
        # fleet run's exit code (PowerShell would only surface the last).
        shell: bash
        run: |
          # Main suite under xdist, with the fleet tests excluded. They
          # monkeypatch module globals and ran in a separate serial job
          # historically; keeping them out of the parallel run preserves
          # that isolation. They run serially just below and append to the
          # same coverage data, so ``fleet.py`` is measured (not omitted)
          # and the 90% gate covers the combined total.
          pytest -n auto --dist worksteal --ignore=tests/test_fleet.py --cov=pipeline_check --cov-report= -q
          pytest tests/test_fleet.py --cov=pipeline_check --cov-append --cov-report=term-missing --cov-fail-under=90
