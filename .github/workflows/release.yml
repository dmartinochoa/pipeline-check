name: Release

# Publishing is manual for now: a tag push builds the sdist/wheel and
# uploads them as a run artifact, but the TestPyPI / PyPI publish jobs
# only run when an operator triggers the workflow via the Actions UI
# (``workflow_dispatch``) with ``publish: true``. This keeps tag
# creation — including ``gh release create`` — from accidentally
# shipping to public indexes before the project is ready for a PyPI
# debut.
on:
  push:
    tags:
      - "v*.*.*"   # semver-looking tags only; patch releases included
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to TestPyPI and PyPI"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build: produce sdist + wheel and upload as a run artifact so the
  # downstream publish jobs can consume the exact same files.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          # Full history so setuptools_scm (if ever added) has the tag.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify tag matches package version
        # Fail loudly if someone tagged v1.2.3 but shipped 1.2.4 in
        # pyproject.toml — otherwise PyPI rejects the upload with a
        # confusing 400 and the tag is already in public history.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/*.whl)
          if ! echo "$WHEEL" | grep -q "$TAG"; then
            echo "Tag $GITHUB_REF_NAME does not match built wheel $WHEEL"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to Test PyPI first — serves as a smoke test and lets us
  # verify the sdist/wheel install cleanly before hitting the real
  # index.
  # ---------------------------------------------------------------------------
  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pipeline_check/
    permissions:
      # OIDC token for PyPI trusted publishing — no long-lived API key.
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Publish to real PyPI — gated on the ``production`` GitHub
  # environment, which can require manual approval before the step
  # runs.
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: publish-testpypi
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://pypi.org/project/pipeline_check/
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
