name: Release

on:
  push:
    tags:
      - "v*.*.*"   # semver-looking tags only; patch releases included

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build: produce sdist + wheel and upload as a run artifact so the
  # downstream publish jobs can consume the exact same files.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          # Full history so setuptools_scm (if ever added) has the tag.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify tag matches package version
        # Fail loudly if someone tagged v1.2.3 but shipped 1.2.4 in
        # pyproject.toml — otherwise PyPI rejects the upload with a
        # confusing 400 and the tag is already in public history.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/*.whl)
          if ! echo "$WHEEL" | grep -q "$TAG"; then
            echo "Tag $GITHUB_REF_NAME does not match built wheel $WHEEL"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Publish to Test PyPI first — serves as a smoke test and lets us
  # verify the sdist/wheel install cleanly before hitting the real
  # index.
  # ---------------------------------------------------------------------------
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pipeline_check/
    permissions:
      # OIDC token for PyPI trusted publishing — no long-lived API key.
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Publish to real PyPI — gated on the ``production`` GitHub
  # environment, which can require manual approval before the step
  # runs.
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://pypi.org/project/pipeline_check/
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
