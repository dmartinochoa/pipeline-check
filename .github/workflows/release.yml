name: Release

# Pushing a ``v*.*.*`` tag builds the sdist/wheel, runs SLSA
# provenance, and ships to TestPyPI followed by real PyPI. The
# "is this OK to ship" gate is the ``production`` GitHub environment
# (configured under Settings -> Environments) which can require
# reviewer approval before the publish-pypi job runs. That puts the
# human checkpoint where it's auditable, instead of relying on an
# operator remembering to toggle a workflow_dispatch input.
#
# ``workflow_dispatch`` is kept as a fallback for re-running the
# pipeline against an existing tag, or for dry-run testing on a
# branch (the ``publish`` input still gates the upload jobs in that
# case so a dispatch from ``dev`` can't ship by accident).
on:
  push:
    tags:
      - "v*.*.*"   # semver-looking tags only; patch releases included
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to TestPyPI and PyPI (workflow_dispatch only)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

# Serialize tag-driven releases so two simultaneous tag pushes (or a
# tag push that races a workflow_dispatch) can't both reach
# ``publish-pypi`` and double-upload the same wheel. ``cancel-in-
# progress: false`` is the right setting here, an in-flight release
# must finish (or fail) cleanly before the next one starts; canceling
# mid-publish risks half-uploaded artifacts or a half-tagged release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build: produce sdist + wheel and upload as a run artifact so the
  # downstream publish jobs can consume the exact same files. Also
  # emits a base64-encoded SHA-256 hash list as a job output for the
  # SLSA provenance generator to bind its attestation to.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      # base64-encoded ``sha256sum`` output covering both the sdist
      # and the wheel. Consumed by the ``provenance`` job below as
      # the in-toto subjects the SLSA Build L3 attestation binds to.
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          # Full history so setuptools_scm (if ever added) has the tag.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --require-hashes -r requirements-ci.txt
          python -m build

      - name: Verify tag matches package version
        # Fail loudly if someone tagged v1.2.3 but shipped 1.2.4 in
        # pyproject.toml. Otherwise PyPI rejects the upload with a
        # confusing 400 and the tag is already in public history.
        # Skipped on workflow_dispatch runs that aren't tag-triggered
        # (the build still produces artifacts for testing).
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/*.whl)
          if ! echo "$WHEEL" | grep -q "$TAG"; then
            echo "Tag $GITHUB_REF_NAME does not match built wheel $WHEEL"
            exit 1
          fi

      - name: Compute SHA-256 subject hashes
        id: hash
        # The SLSA generator's reusable workflow expects a single
        # base64-encoded ``sha256sum`` output line covering every
        # subject the attestation should bind to. ``sha256sum *``
        # emits one ``<hash>  <filename>`` line per file under
        # ``dist/``; ``base64 -w0`` collapses the whole block into
        # one line so it survives transit through ``GITHUB_OUTPUT``.
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Vulnerability scan with pip-audit
        # Audits the project's resolved dependency tree against the
        # PyPA vulnerability database. Runs against the requirements
        # lockfile (hash-locked, so a transitive bump shows up as a
        # diff in CI) rather than the wheel — pip-audit's wheel mode
        # only inspects direct deps in the metadata.
        run: pip-audit --requirement requirements.txt --strict

      - name: Generate SBOM (CycloneDX)
        # Emits an SBOM next to the wheel. cyclonedx-py reads the
        # current Python environment after we install the wheel, so
        # the SBOM reflects the exact dep set a downstream consumer
        # will pull in on ``pip install pipeline-check==<tag>``. The
        # output goes to ``sbom/`` instead of ``dist/`` so the
        # publish step's ``twine check`` doesn't choke on a
        # non-distribution file (gh-action-pypi-publish refuses to
        # upload anything in ``dist/`` that isn't a wheel or sdist).
        #
        # Install ordering: deps come from the hash-locked
        # ``requirements.txt`` (``--require-hashes`` rejects any tarball
        # whose SHA-256 doesn't match), then the freshly built wheel
        # lands on top with ``--no-deps`` so pip doesn't reach back to
        # PyPI for unverified transitives. Project-side hash pinning
        # is what GHA-060 asks for on every workflow.
        run: |
          python -m pip install --require-hashes -r requirements.txt
          python -m pip install --no-deps dist/*.whl
          mkdir -p sbom
          cyclonedx-py environment --output-file sbom/sbom.cdx.json
          ls sbom/

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom/sbom.cdx.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Provenance: SLSA Build L3 attestation for the sdist + wheel.
  #
  # Calls the slsa-framework/slsa-github-generator reusable workflow,
  # which runs in an isolated builder GitHub maintains. The builder
  # reads the ``base64-subjects`` (the SHA-256 hashes the ``build``
  # job emitted), generates an in-toto SLSA Provenance v1.0
  # predicate naming this workflow run, and signs it via Sigstore
  # using the workflow's OIDC token. Output is a ``*.intoto.jsonl``
  # file uploaded as a workflow run artifact (and, when the run is
  # tag-triggered and a GitHub release for the tag already exists,
  # attached as a release asset).
  #
  # Verification by downstream consumers, using slsa-verifier, is
  # documented in the README under "Verifying a release". Verifies
  # that the wheel they're about to install was built from this
  # repository at the tagged commit, in CI, by this workflow.
  #
  # Note: the generator workflow is pinned by SHA (matching the
  # project-wide SHA-pin convention enforced by GHA-001 / GHA-025).
  # The comment names the corresponding release tag so the SLSA
  # verifier's ``--source-tag`` matches at the consumer side.
  # ---------------------------------------------------------------------------
  provenance:
    needs: [build]
    permissions:
      actions: read       # read run metadata to embed in the predicate
      id-token: write     # OIDC token used for Sigstore signing
      contents: write     # upload the provenance file to the GH release
    # The SLSA generator MUST be pinned by semantic-version tag,
    # not by commit SHA. ``slsa-verifier`` checks the trusted-
    # builder ref embedded in the generated provenance against an
    # allow-list of known SLSA generator tags; a SHA pin produces
    # a ref the verifier doesn't recognize, which fails every
    # downstream verification call (``slsa-verifier verify-artifact
    # ... --source-uri ...``) and defeats the point of generating
    # the attestation in the first place. CodeRabbit caught this
    # regression on PR #93. The accompanying ``GHA-025`` finding
    # on this file is suppressed in ``.pipelinecheckignore`` with
    # the same rationale.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: pipeline-check.intoto.jsonl
      # ``upload-assets`` is held at ``false`` because the repo has
      # immutable releases enabled. The SLSA generator's underlying
      # ``softprops/action-gh-release`` step does a two-call sequence
      # (create release, then upload asset). Once the create succeeds,
      # immutability locks the release and the upload fails with
      # ``Cannot upload assets to an immutable release``, which
      # cascades into ``publish-pypi`` not running. v1.0.2 and v1.0.3
      # were skipped on this exact failure (see CHANGELOG). The
      # provenance file still lands as a workflow run artifact so a
      # downstream verifier can fetch it via the run; the wheel
      # itself carries PEP 740 attestations on PyPI via the
      # ``attestations: true`` flag on the publish job.
      upload-assets: false

  # ---------------------------------------------------------------------------
  # Publish to PyPI. Single hop — no TestPyPI intermediate step. The
  # earlier TestPyPI pre-flight added a separate trusted-publisher
  # surface to maintain (different environment name, separate PyPI
  # account configuration) without catching anything the ``build``
  # job's ``Verify tag matches package version`` + ``pip-audit
  # --strict`` + ``twine check`` (implicit in gh-action-pypi-publish)
  # didn't already catch. ``production`` GitHub environment provides
  # the human-approval checkpoint before the real-index push.
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: [build, provenance]
    # Auto on ``v*.*.*`` tag push. On workflow_dispatch the ``publish``
    # input still gates the upload so an operator running this against
    # a branch for testing can't ship to PyPI by accident.
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://pypi.org/project/pipeline_check/
    permissions:
      # OIDC token for PyPI trusted publishing — no long-lived API key.
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # PEP 740 in-toto attestations published alongside the
          # artifact. The PyPI ``id-token: write`` permission above
          # supplies the OIDC token the action uses to sign.
          attestations: true

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release for the tag. The Marketplace listing for
  # the bundled composite action (``action.yml``) tracks the latest
  # *published Release*, not the latest tag — so PyPI / Docker can
  # ship from a tag push while the Marketplace tile sits frozen on
  # whatever release was last published through the UI. v1.1.0 and
  # v1.2.0 both shipped to PyPI without a corresponding GH Release
  # being created manually, which left the Marketplace stuck on
  # v1.0.5 for two cycles. This job closes that gap by creating the
  # Release in the same workflow as the PyPI upload.
  #
  # Tag-push only: workflow_dispatch re-runs against an existing tag
  # would race the create call (releases are unique per tag). No
  # asset upload — the repo has immutable releases enabled (see the
  # provenance job's ``upload-assets: false`` rationale), and the
  # wheel + PEP 740 attestations already live on PyPI.
  # ---------------------------------------------------------------------------
  publish-github-release:
    needs: [publish-pypi, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Extract CHANGELOG section for this tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          # Literal field-equality match — ``$0 ~ "^## [$VERSION]"``
          # would treat the brackets as a regex character class and
          # silently produce empty notes.
          awk -v ver="[$VERSION]" '
            $1 == "##" && $2 == ver { found=1; next }
            found && /^## \[/ { exit }
            found
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for $VERSION"
            exit 1
          fi
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag \
            --latest
