name: Scorecard

# OpenSSF Scorecard scans this repo against the Scorecard checks
# (Branch-Protection, Token-Permissions, Pinned-Dependencies, SAST,
# Vulnerabilities, etc.) and uploads the result as SARIF so it
# surfaces in the GitHub Security tab. The published score also
# powers the OpenSSF Best Practices badge.
#
# The action runs as a third-party workflow, so it's pinned by SHA
# (per the project's own GHA-001 rule). Update the SHA and the
# trailing ``# v...`` comment together when bumping.

on:
  push:
    branches: ["master"]
  schedule:
    # Weekly run picks up Scorecard's rule additions and a
    # branch-protection regression that no PR-time scan would catch.
    - cron: "32 5 * * 1"

# Scorecard needs ``security-events: write`` to upload SARIF and
# ``id-token: write`` to publish the result (the latter feeds the
# OpenSSF badge). ``actions: read`` lets the workflow inspect other
# workflows' permissions and findings.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload raw SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          retention-days: 14

  upload:
    needs: analysis
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write

    steps:
      - name: Download SARIF
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: scorecard-sarif

      - name: Filter test-fixture false positives
        run: |
          python3 -c "
          import json
          sarif = json.load(open('scorecard-results.sarif'))
          EXCLUDE = ('tests/', 'bench/')
          for run in sarif.get('runs', []):
              run['results'] = [
                  r for r in run.get('results', [])
                  if not any(
                      loc.get('physicalLocation', {})
                         .get('artifactLocation', {})
                         .get('uri', '').startswith(prefix)
                      for loc in r.get('locations', [])
                      for prefix in EXCLUDE
                  )
              ]
          json.dump(sarif, open('scorecard-results.sarif', 'w'))
          "

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
