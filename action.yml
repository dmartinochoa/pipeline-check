name: 'pipeline-check'
description: 'CI/CD pipeline security scanner. 1110+ checks across 32 providers, 18 compliance standards. SARIF output for code scanning.'
author: 'Pipeline-Check'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  pipeline:
    description: >
      Provider to scan. ``auto`` detects the right provider from the
      workspace. Pass an explicit name (``github``, ``gitlab``,
      ``terraform``, ``kubernetes``, ``helm``, ``dockerfile``,
      ``aws``, ...) or a comma-separated list (``github,oci``) to
      activate cross-provider attack chains.
    required: false
    default: 'auto'
  path:
    description: >
      Workspace path to scan. Forwarded to the matching ``--<provider>-
      path`` flag. Defaults to the repo root.
    required: false
    default: '.'
  fail-on:
    description: >
      Fail the build if any finding meets or exceeds this severity.
      One of CRITICAL, HIGH, MEDIUM, LOW. Empty string disables
      severity gating.
    required: false
    default: 'HIGH'
  min-grade:
    description: >
      Fail if the scan grades worse than this letter (A, B, C, D).
      Empty disables grade gating.
    required: false
    default: ''
  max-failures:
    description: >
      Fail if more than N effective findings are emitted. Empty
      disables the cap.
    required: false
    default: ''
  fail-on-check:
    description: >
      Comma-separated list of check IDs that should always trip the
      gate (e.g. ``GHA-002,GL-007``). Repeats of the underlying CLI
      flag are emitted automatically.
    required: false
    default: ''
  severity-threshold:
    description: >
      Minimum severity to report. INFO, LOW, MEDIUM, HIGH, CRITICAL.
    required: false
    default: 'INFO'
  baseline:
    description: >
      Path to a prior JSON report. Existing findings won't gate the
      build; only new findings count.
    required: false
    default: ''
  baseline-from-git:
    description: >
      ``REF:PATH`` (e.g. ``origin/main:baseline.json``). Resolves the
      baseline via ``git show`` instead of reading from disk.
    required: false
    default: ''
  diff-base:
    description: >
      Only scan files changed vs this git ref (e.g. ``origin/main``).
      Pairs naturally with PR builds.
    required: false
    default: ''
  standard:
    description: >
      Comma-separated standards to annotate findings with
      (``owasp_cicd_top_10,nist_ssdf``). Empty enables all.
    required: false
    default: ''
  output:
    description: >
      Output format. ``sarif`` is the default so findings flow into
      the GitHub Security tab via the upload-sarif step. Other
      options: ``terminal``, ``json``, ``html``, ``junit``,
      ``markdown``, ``codequality``, ``cyclonedx``, ``both``.
    required: false
    default: 'sarif'
  output-file:
    description: >
      Path to write the report. When left blank a per-format default
      is used: ``pipeline-check.sarif`` for SARIF (so the upload-sarif
      step keeps working), ``pipeline-check.json`` for JSON,
      ``pipeline-check.html`` for HTML, ``pipeline-check.xml`` for
      JUnit, ``pipeline-check.md`` for Markdown,
      ``gl-code-quality-report.json`` for Code Quality (the GitLab
      convention), ``pipeline-check-sbom.json`` for CycloneDX,
      ``pipeline-check-threatmodel.json`` for the threat-model
      report. Terminal / both write to stdout when this is blank.
    required: false
    default: ''
  upload-sarif:
    description: >
      When ``true`` and ``output`` is ``sarif``, upload the SARIF
      file to GitHub code scanning. Requires ``security-events:
      write`` on the calling job.
    required: false
    default: 'true'
  ignore-file:
    description: >
      Path to a ``.pipelinecheckignore`` file (flat or YAML with
      ``expires:`` dates).
    required: false
    default: ''
  pipeline-check-version:
    description: >
      Pin to a specific pipeline-check release. Defaults to the
      latest version on PyPI.
    required: false
    default: ''
  python-version:
    description: 'Python version installed for running the scanner.'
    required: false
    default: '3.12'
  resolve-remote:
    description: >
      Pass ``--resolve-remote`` to scan reusable workflow callees
      over HTTPS. Off by default.
    required: false
    default: 'false'
  extra-args:
    description: >
      Free-form CLI flags appended to the scanner invocation. Useful
      for ``--checks``, ``--secret-pattern``, ``--custom-rules``, and
      similar flags not represented above. Quoted as a single string.
    required: false
    default: ''
  pr-comment:
    description: >
      Post inline review comments on the PR diff. ``true`` enables on
      pull_request events; ``false`` disables. Requires
      ``pull-requests: write`` permission. Findings outside the diff
      fall back to a single PR-level summary comment.
    required: false
    default: 'true'
  comment-mode:
    description: >
      ``per-finding`` posts one review comment per finding location;
      ``summary`` posts a single PR-level comment listing every finding.
    required: false
    default: 'per-finding'
  gh-token:
    description: >
      Token used to post PR review comments. Defaults to the runner-
      provided ``GITHUB_TOKEN``. Only needed when ``pr-comment`` is
      enabled.
    required: false
    default: ${{ github.token }}

outputs:
  exit-code:
    description: 'Scanner exit code. 0=pass, 1=gate failed, 2=scanner error, 3=config error.'
    value: ${{ steps.run.outputs.exit-code }}
  findings-count:
    description: 'Total findings emitted by the scanner.'
    value: ${{ steps.run.outputs.findings-count }}
  failed-count:
    description: 'Findings whose passed=false (matches --fail-on logic).'
    value: ${{ steps.run.outputs.failed-count }}
  score:
    description: 'Severity-weighted score, 0-100.'
    value: ${{ steps.run.outputs.score }}
  grade:
    description: 'Letter grade A through D.'
    value: ${{ steps.run.outputs.grade }}
  sarif-file:
    description: 'Path of the SARIF file written when output=sarif.'
    value: ${{ steps.run.outputs.sarif-file }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install pipeline-check
      shell: bash
      env:
        VERSION: ${{ inputs.pipeline-check-version }}
      run: |
        if [ -n "$VERSION" ]; then
          pip install "pipeline-check==$VERSION"
        else
          pip install pipeline-check
        fi

    - name: Run pipeline-check
      id: run
      shell: bash
      env:
        PIPELINE: ${{ inputs.pipeline }}
        WORKSPACE_PATH: ${{ inputs.path }}
        FAIL_ON: ${{ inputs.fail-on }}
        MIN_GRADE: ${{ inputs.min-grade }}
        MAX_FAILURES: ${{ inputs.max-failures }}
        FAIL_ON_CHECK: ${{ inputs.fail-on-check }}
        SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        BASELINE: ${{ inputs.baseline }}
        BASELINE_FROM_GIT: ${{ inputs.baseline-from-git }}
        DIFF_BASE: ${{ inputs.diff-base }}
        STANDARD: ${{ inputs.standard }}
        OUTPUT_FORMAT: ${{ inputs.output }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        IGNORE_FILE: ${{ inputs.ignore-file }}
        RESOLVE_REMOTE: ${{ inputs.resolve-remote }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set +e
        args=()

        if [[ "$PIPELINE" == *,* ]]; then
          args+=(--pipelines "$PIPELINE")
        elif [ -n "$PIPELINE" ]; then
          args+=(--pipeline "$PIPELINE")
        fi

        # ``WORKSPACE_PATH`` is a workspace-relative path (e.g.
        # ``charts/api`` for a non-root Helm chart). Map it onto
        # the per-provider path flag so we don't fight the CLI's
        # auto-detect logic. ``auto`` and the no-path AWS / live
        # modes don't take a path; for ``auto`` we ``cd`` into the
        # directory so the CLI's own auto-detect runs there.
        if [ -n "$WORKSPACE_PATH" ] && [ "$WORKSPACE_PATH" != "." ]; then
          case "$PIPELINE" in
            github)         args+=(--gha-path        "$WORKSPACE_PATH") ;;
            gitlab)         args+=(--gitlab-path     "$WORKSPACE_PATH") ;;
            bitbucket)      args+=(--bitbucket-path  "$WORKSPACE_PATH") ;;
            azure)          args+=(--azure-path      "$WORKSPACE_PATH") ;;
            jenkins)        args+=(--jenkinsfile-path "$WORKSPACE_PATH") ;;
            circleci)       args+=(--circleci-path   "$WORKSPACE_PATH") ;;
            cloudformation) args+=(--cfn-template    "$WORKSPACE_PATH") ;;
            terraform)      args+=(--tf-plan         "$WORKSPACE_PATH") ;;
            cloudbuild)     args+=(--cloudbuild-path "$WORKSPACE_PATH") ;;
            buildkite)      args+=(--buildkite-path  "$WORKSPACE_PATH") ;;
            drone)          args+=(--drone-path      "$WORKSPACE_PATH") ;;
            tekton)         args+=(--tekton-path     "$WORKSPACE_PATH") ;;
            argo)           args+=(--argo-path       "$WORKSPACE_PATH") ;;
            argocd)         args+=(--argocd-path     "$WORKSPACE_PATH") ;;
            dockerfile)     args+=(--dockerfile-path "$WORKSPACE_PATH") ;;
            kubernetes)     args+=(--k8s-path        "$WORKSPACE_PATH") ;;
            helm)           args+=(--helm-path       "$WORKSPACE_PATH") ;;
            oci)            args+=(--oci-manifest    "$WORKSPACE_PATH") ;;
            npm)            args+=(--npm-path        "$WORKSPACE_PATH") ;;
            pypi)           args+=(--pypi-path       "$WORKSPACE_PATH") ;;
            maven)          args+=(--maven-path      "$WORKSPACE_PATH") ;;
            nuget)          args+=(--nuget-path      "$WORKSPACE_PATH") ;;
            auto|"")        cd "$WORKSPACE_PATH" || exit 3 ;;
            aws)            : ;;  # AWS scans the live account, no path
            *,*)            : ;;  # multi-pipeline, leave each provider on auto-detect
          esac
        fi

        [ -n "$FAIL_ON" ]            && args+=(--fail-on "$FAIL_ON")
        [ -n "$MIN_GRADE" ]          && args+=(--min-grade "$MIN_GRADE")
        [ -n "$MAX_FAILURES" ]       && args+=(--max-failures "$MAX_FAILURES")
        [ -n "$SEVERITY_THRESHOLD" ] && args+=(--severity-threshold "$SEVERITY_THRESHOLD")
        [ -n "$BASELINE" ]           && args+=(--baseline "$BASELINE")
        [ -n "$BASELINE_FROM_GIT" ]  && args+=(--baseline-from-git "$BASELINE_FROM_GIT")
        [ -n "$DIFF_BASE" ]          && args+=(--diff-base "$DIFF_BASE")
        [ -n "$IGNORE_FILE" ]        && args+=(--ignore-file "$IGNORE_FILE")
        [ -n "$OUTPUT_FORMAT" ]      && args+=(--output "$OUTPUT_FORMAT")

        # Derive a per-format default filename when the caller left
        # ``output-file`` blank. The previous behavior always wrote
        # ``pipeline-check.sarif`` regardless of format, so a caller
        # who set ``output: codequality`` without overriding the file
        # name got the Code Quality JSON in a ``.sarif`` file —
        # invisible to GitLab's ``artifacts.reports.codequality:``
        # slot, no error to diagnose. Terminal/both stay blank
        # because they stream to stdout.
        if [ -z "$OUTPUT_FILE" ]; then
          case "$OUTPUT_FORMAT" in
            sarif|"")    OUTPUT_FILE="pipeline-check.sarif" ;;
            json)        OUTPUT_FILE="pipeline-check.json" ;;
            html)        OUTPUT_FILE="pipeline-check.html" ;;
            junit)       OUTPUT_FILE="pipeline-check.xml" ;;
            markdown)    OUTPUT_FILE="pipeline-check.md" ;;
            codequality) OUTPUT_FILE="gl-code-quality-report.json" ;;
            cyclonedx)   OUTPUT_FILE="pipeline-check-sbom.json" ;;
            threatmodel) OUTPUT_FILE="pipeline-check-threatmodel.json" ;;
          esac
        fi
        [ -n "$OUTPUT_FILE" ]        && args+=(--output-file "$OUTPUT_FILE")
        [ "$RESOLVE_REMOTE" = "true" ] && args+=(--resolve-remote)

        if [ -n "$STANDARD" ]; then
          IFS=',' read -ra STDS <<< "$STANDARD"
          for s in "${STDS[@]}"; do
            args+=(--standard "$s")
          done
        fi

        if [ -n "$FAIL_ON_CHECK" ]; then
          IFS=',' read -ra IDS <<< "$FAIL_ON_CHECK"
          for c in "${IDS[@]}"; do
            args+=(--fail-on-check "$c")
          done
        fi

        if [ -n "$EXTRA_ARGS" ]; then
          # shellcheck disable=SC2206
          extra=($EXTRA_ARGS)
          args+=("${extra[@]}")
        fi

        echo "::group::pipeline_check ${args[*]}"
        pipeline_check "${args[@]}"
        ec=$?
        echo "::endgroup::"

        echo "exit-code=$ec" >> "$GITHUB_OUTPUT"
        echo "sarif-file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

        # Produce a JSON sidecar at a known path. Used for: (a) action
        # outputs (score, grade, counts) and (b) the PR-comment step.
        # When the primary output is already JSON, just copy it.
        # Otherwise re-scan with ``--output json``.
        stats="$RUNNER_TEMP/pipeline-check-report.json"
        if [ "$OUTPUT_FORMAT" = "json" ] && [ -f "$OUTPUT_FILE" ]; then
          cp "$OUTPUT_FILE" "$stats"
        fi

        if [ ! -s "$stats" ]; then
          stats_args=()
          skip_next=0
          for tok in "${args[@]}"; do
            if [ "$skip_next" -eq 1 ]; then
              skip_next=0
              continue
            fi
            case "$tok" in
              --output|--output-file|--fail-on|--min-grade|--max-failures|--fail-on-check)
                skip_next=1 ;;
              *) stats_args+=("$tok") ;;
            esac
          done
          stats_args+=(--output json --output-file "$stats")
          pipeline_check "${stats_args[@]}" >/dev/null 2>&1 || true
        fi

        if [ -s "$stats" ]; then
          python - "$stats" <<'PY' >> "$GITHUB_OUTPUT"
        import json, sys
        with open(sys.argv[1]) as fh:
            data = json.load(fh)
        findings = data.get("findings") or []
        failed = sum(1 for f in findings if not f.get("passed", True))
        score = data.get("score") or {}
        if not isinstance(score, dict):
            score = {}
        print(f"findings-count={len(findings)}")
        print(f"failed-count={failed}")
        print(f"score={score.get('score', '')}")
        print(f"grade={score.get('grade', '')}")
        PY
        fi

        # Re-raise the original exit code so the job reflects the gate.
        exit $ec

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && inputs.output == 'sarif' && always() }}
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
      with:
        # ``steps.run.outputs.sarif-file`` carries the path the run step
        # actually wrote to — either the explicit ``inputs.output-file``
        # or the per-format default the step derives. Reading
        # ``inputs.output-file`` here would be empty when the caller
        # relied on the default.
        sarif_file: ${{ steps.run.outputs.sarif-file }}

    - name: Post PR review comments
      if: >-
        ${{
          inputs.pr-comment == 'true'
          && github.event_name == 'pull_request'
          && always()
        }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        PIPELINE_CHECK_REPORT: ${{ runner.temp }}/pipeline-check-report.json
        PIPELINE_CHECK_PIPELINE: ${{ inputs.pipeline }}
        PIPELINE_CHECK_PATH: ${{ inputs.path }}
        PIPELINE_CHECK_SEVERITY: ${{ inputs.severity-threshold }}
        PIPELINE_CHECK_RESOLVE_REMOTE: ${{ inputs.resolve-remote }}
        PIPELINE_CHECK_COMMENT_MODE: ${{ inputs.comment-mode }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: python "$GITHUB_ACTION_PATH/.github/actions/pipeline-check-pr/entrypoint.py"
