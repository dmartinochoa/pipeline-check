name: triage
on:
  pull_request_target:
    types: [opened, edited]
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # GHA-002: pull_request_target trigger + PR-head checkout =
      # attacker-controlled code runs with the base repo's secrets
      # and a write-scope GITHUB_TOKEN. The canonical "pwn request"
      # primitive (GitHub Security Lab 2020).
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # GHA-003: PR title interpolated straight into shell. The
      # ``${{ ... }}`` expansion happens BEFORE shell quoting, so a
      # title containing ``"; curl ...`` breaks out of the echo.
      - run: |
          echo "Building PR titled: ${{ github.event.pull_request.title }}"

      - run: make build && make test

      # GHA-019: write the GITHUB_TOKEN to a file the upload
      # surfaces. Anyone who can pull the artifact lifts the token.
      - run: echo "GITHUB_TOKEN=$GITHUB_TOKEN" >> $GITHUB_ENV
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: dist
          path: ./
