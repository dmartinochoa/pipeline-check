# Real-world GOAT corpus for pipeline-check.
#
# Each entry pins a vulnerable-by-design testbed to a fixed ref so a
# goat's upstream churn doesn't move pipeline-check's recall numbers
# under our feet. Refs can be branches, tags, or full 40-char SHAs;
# branches and tags are convenient on day one but a nightly cron
# eventually wants SHAs so the bench is reproducible across time.
#
# The runner records the resolved commit SHA in
# ``bench/goats/<slug>/baseline.json`` even when ``ref`` is a branch,
# so drift remains detectable until the manifest is hand-pinned.
#
# To skip a goat (e.g. one that needs infrastructure pipeline-check
# does not yet support), set ``skip: true`` with a ``skip_reason``
# string explaining why. The goat still shows up in the report as
# ``skipped`` so the gap stays visible rather than getting silently
# dropped.
goats:
  - slug: cicd-goat
    repo: https://github.com/cider-security-research/cicd-goat
    ref: main
    pipelines: [github, jenkins]
    # GHA workflows live at the canonical ``.github/workflows/``
    # path. Jenkinsfiles live under ``gitea/repositories/<name>/``
    # (the goat's seven vulnerable pipelines); the runner globs the
    # tree for files exactly named ``Jenkinsfile`` and dispatches
    # one Jenkins scan per file, skipping ``solutions/`` (cicd-goat
    # ships answer-key copies there) and standard VCS noise.
    description: >
      Cider's CI/CD security training lab. Anchored against all 10
      OWASP CI/CD risks. Canonical goat for this scanner's wedge.

  - slug: cicd-goat-comparison
    repo: https://github.com/greylag-ci/cicd-goat
    ref: main
    pipelines: [github, npm]
    args:
      # The npm provider needs an explicit path; package.json files
      # live under scenarios/20-*/ and scenarios/29-*/.
      - --npm-path
      - scenarios
    # 38 per-scenario workflow files under .github/workflows/
    # (scenario-01-*.yml .. scenario-38-*.yml). Some scenarios ship
    # sibling data (scenarios/10-*/trust-policy.json,
    # scenarios/20-*/package.json, scenarios/22-*/workload-identity-
    # pool.tf) that GHA-062 / NPM-001 / NPM-004 walk. The npm
    # pipeline covers scenarios 20 + 29 (dependency-confusion /
    # lifecycle-script-RCE).
    description: >
      38-scenario cross-scanner comparison matrix. Each scenario
      isolates one CI/CD vulnerability with a minimal GHA workflow.
      Coverage: 31/38 as of v1.4.0; 38/38 push tracked in ROADMAP.md.

  - slug: terragoat
    repo: https://github.com/bridgecrewio/terragoat
    ref: master
    pipelines: [terraform]
    args: ["--tf-source", "terraform/aws"]
    description: Vulnerable Terraform configurations (HCL source path).

  - slug: cfngoat
    repo: https://github.com/bridgecrewio/cfngoat
    ref: master
    pipelines: [cloudformation]
    args:
      # cfngoat.yaml is the headline template at the repo root; the
      # CFN provider takes a single template per scan and doesn't
      # glob. The repo also ships eks.yaml as a smaller secondary
      # template; add it via a second goat entry if recall coverage
      # there is wanted.
      - --cfn-template
      - cfngoat.yaml
    description: Vulnerable CloudFormation templates.

  - slug: kubernetes-goat
    repo: https://github.com/madhuakula/kubernetes-goat
    ref: master
    pipelines: [kubernetes]
    args:
      # K8s manifests are scattered under scenarios/<scenario>/*.yaml
      # rather than at a canonical manifests/ path. Point the K8s
      # provider at scenarios/ so the directory walker picks all of
      # them up in one scan.
      - --k8s-path
      - scenarios
    description: >
      Vulnerable Kubernetes cluster + workloads. Goat ships both
      cluster setup and per-scenario manifests; the scanner runs
      against the manifest tree.
