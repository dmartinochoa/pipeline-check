<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pipeline-Check goose-patrol scene. Self-contained: all keyframes
  and animation classes live in the <style> block below so the file
  works the same whether loaded as ``<img src="patrol.svg">``,
  fetched as a raw URL, or referenced from any external context
  that can't pull in a separate stylesheet.

  Source-of-truth lives at .claude/design_system/preview/brand-logo-animation.html;
  this file is the production-shipping derivative with the design-system
  chrome (controls, legend, label rows) stripped.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 350"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="Pipeline-Check goose patrolling a CI/CD pipeline rail — pauses at the SCAN node, stamps DENIED, and turns back">
  <style>
    /* Walk cycle: 14s loop. The goose enters from the left, pauses
       at TEST and SCAN, stamps DENIED at SCAN, flips around, and
       walks back off-screen. World coords: rail at y=240, stage
       nodes at x∈{80, 280, 480, 680}. The goose never reaches
       DEPLOY — the whole point is the pipeline was blocked.

       Per-keyframe ``animation-timing-function`` gives each travel
       segment its own curve: ease-out into a pause (decelerate to
       a stop), linear across the pause itself, ease-in on the
       return walk so the goose accelerates away after DENIED. */
    @keyframes patrol-walk {
      0%   { transform: translate(-60px, 240px);  animation-timing-function: ease-out; }
      22%  { transform: translate(280px, 240px);  animation-timing-function: linear;   }
      32%  { transform: translate(280px, 240px);  animation-timing-function: ease-out; }
      50%  { transform: translate(480px, 240px);  animation-timing-function: linear;   }
      72%  { transform: translate(480px, 240px);  animation-timing-function: linear;   }
      73%  { transform: translate(480px, 240px) scaleX(-1); animation-timing-function: ease-in; }
      94%  { transform: translate(-60px, 240px) scaleX(-1); animation-timing-function: linear;  }
      100% { transform: translate(-60px, 240px) scaleX(-1); }
    }
    /* Body bob locked to the patrol timeline (14s). The goose only
       bobs while walking — it holds still at TEST and SCAN. Three
       bob segments: entrance→TEST, TEST→SCAN, and the return walk
       after DENIED. */
    @keyframes patrol-bob {
      /* entrance → TEST: 0% – 22%, three steps */
      0%   { transform: translateY(0); }
      4%   { transform: translateY(-2.5px); }
      9%   { transform: translateY(0); }
      13%  { transform: translateY(-2.5px); }
      18%  { transform: translateY(0); }
      22%  { transform: translateY(0); }
      /* TEST pause: 22% – 32% — body still */
      32%  { transform: translateY(0); }
      /* TEST → SCAN: 32% – 50%, two steps */
      36%  { transform: translateY(-2.5px); }
      41%  { transform: translateY(0); }
      46%  { transform: translateY(-2.5px); }
      50%  { transform: translateY(0); }
      /* SCAN pause + flip: 50% – 73% — body still while inspecting */
      73%  { transform: translateY(0); }
      /* Return walk: 73% – 94%, three steps */
      77%  { transform: translateY(-2.5px); }
      81%  { transform: translateY(0); }
      85%  { transform: translateY(-2.5px); }
      89%  { transform: translateY(0); }
      93%  { transform: translateY(-2.5px); }
      94%  { transform: translateY(0); }
      /* off-screen */
      100% { transform: translateY(0); }
    }
    /* Scan ring — three rings overlap during the SCAN pause
       (50% – 72%) so the inspection reads as a sustained radar
       sweep instead of a single twitch. Each ring runs the same
       keyframe; ``.r2`` and ``.r3`` shift forward in real time via
       animation-delay so their pulses fall ~4% / ~8% later in the
       patrol cycle. ``backwards`` fill keeps them invisible during
       the delay window before their first cycle starts. */
    @keyframes patrol-scan-pulse {
      0%, 50%   { opacity: 0;  transform: scale(.4); }
      54%       { opacity: .9; transform: scale(.7); }
      60%       { opacity: .55; transform: scale(1.2); }
      66%, 100% { opacity: 0;  transform: scale(1.6); }
    }
    /* DENIED stamp — appears just after the third radar pulse
       lands (~66%) and clears before the goose departs SCAN at
       72%. Tightened from the prior 60% – 100% window, which let
       the stamp linger after the goose had already walked off. */
    @keyframes patrol-denied-pop {
      0%, 64%   { opacity: 0; transform: translateY(-3px) scale(.6); }
      68%       { opacity: 1; transform: translateY(0)    scale(1);  }
      82%       { opacity: 1; transform: translateY(0)    scale(1);  }
      88%, 100% { opacity: 0; transform: translateY(-2px) scale(.9); }
    }
    @keyframes patrol-blink {
      0%, 92%, 100% { transform: scaleY(1); }
      94%, 96%      { transform: scaleY(.1); }
    }
    @keyframes patrol-commit-flow {
      0%   { transform: translateX(-40px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(800px); opacity: 0; }
    }

    .goose-patrol { animation: patrol-walk 14s linear infinite; }
    .goose-bob {
      animation: patrol-bob 14s linear infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .scan-ring {
      animation: patrol-scan-pulse 14s linear infinite both;
      transform-origin: center;
      transform-box: fill-box;
    }
    .scan-ring.r2 { animation-delay: 0.56s; /* +4% offset on a 14s loop */ }
    .scan-ring.r3 { animation-delay: 1.12s; /* +8% offset on a 14s loop */ }
    .denied-pop {
      animation: patrol-denied-pop 14s linear infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .eye-blink {
      animation: patrol-blink 5s linear infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .commit { animation: patrol-commit-flow 4.6s linear infinite; }
    .commit.c2 { animation-delay: 1.2s; }
    .commit.c3 { animation-delay: 2.6s; }
    .commit.c4 { animation-delay: 3.6s; }

    /* Vestibular-safety: pause every layer when the user has
       expressed the preference. The scene still reads as a
       goose-on-the-rail, just frozen at TEST. */
    @media (prefers-reduced-motion: reduce) {
      .goose-patrol, .goose-bob, .scan-ring,
      .denied-pop, .eye-blink, .commit {
        animation: none;
      }
      .goose-patrol { transform: translate(280px, 240px); }
      .denied-pop, .scan-ring { opacity: 0; }
    }
  </style>

  <line x1="40" y1="240" x2="760" y2="240" stroke="#f0f2f5" stroke-width="1.4" opacity=".25"/>
  <g>
    <circle cx="80" cy="240" r="5" fill="#f0f2f5" opacity=".55"/>
    <text x="80" y="262" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c8a99" letter-spacing=".1em">BUILD</text>
    <circle cx="280" cy="240" r="5" fill="#f0f2f5" opacity=".55"/>
    <text x="280" y="262" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c8a99" letter-spacing=".1em">TEST</text>
    <circle cx="480" cy="240" r="6" fill="#1ba3a9"/>
    <text x="480" y="262" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1ba3a9" letter-spacing=".1em">SCAN</text>
    <circle cx="680" cy="240" r="5" fill="#f0f2f5" opacity=".55"/>
    <text x="680" y="262" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c8a99" letter-spacing=".1em">DEPLOY</text>
  </g>
  <g class="commit"><rect x="-20" y="232" width="14" height="14" rx="2" fill="#0e2333" stroke="#1ba3a9" stroke-width="1"/><text x="-13" y="242" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#1ba3a9">a3f</text></g>
  <g class="commit c2"><rect x="-20" y="232" width="14" height="14" rx="2" fill="#0e2333" stroke="#1ba3a9" stroke-width="1"/><text x="-13" y="242" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#1ba3a9">9c2</text></g>
  <g class="commit c3"><rect x="-20" y="232" width="14" height="14" rx="2" fill="#0e2333" stroke="#1ba3a9" stroke-width="1"/><text x="-13" y="242" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#1ba3a9">f81</text></g>
  <g class="commit c4"><rect x="-20" y="232" width="14" height="14" rx="2" fill="#0e2333" stroke="#1ba3a9" stroke-width="1"/><text x="-13" y="242" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#1ba3a9">d04</text></g>
  <g transform="translate(480, 188)">
    <g class="denied-pop">
      <rect x="-30" y="-12" width="60" height="22" rx="3" fill="#04101a" stroke="#dc3545" stroke-width="1.4"/>
      <text x="0" y="3" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" letter-spacing=".18em" fill="#dc3545">DENIED</text>
    </g>
  </g>
  <g class="goose-patrol">
    <g class="goose-bob">
      <g transform="translate(60, -60)">
        <circle class="scan-ring"    r="20" fill="none" stroke="#1ba3a9" stroke-width="1.4"/>
        <circle class="scan-ring r2" r="20" fill="none" stroke="#1ba3a9" stroke-width="1.2"/>
        <circle class="scan-ring r3" r="20" fill="none" stroke="#1ba3a9" stroke-width="1"/>
      </g>
      <g transform="translate(-36, -58)">
        <path d="M22 50 Q14 50 14 38 Q14 24 30 22 Q48 20 52 36 Q54 50 44 52 Q32 54 22 50 Z" fill="#f0f2f5" stroke="#f0f2f5" stroke-width="1" stroke-linejoin="round"/>
        <path d="M26 38 Q34 32 44 36 Q42 42 34 44 Q28 44 26 38 Z" fill="#04101a" opacity=".55"/>
        <path d="M48 28 Q52 18 60 14 Q66 12 68 8" stroke="#f0f2f5" stroke-width="3.6" stroke-linecap="round" fill="none"/>
        <circle cx="70" cy="9" r="6.2" fill="#f0f2f5"/>
        <circle cx="67" cy="11" r="1.6" fill="#1ba3a9" opacity=".4"/>
        <g class="eye-blink">
          <circle cx="72" cy="8" r="1.1" fill="#04101a"/>
          <circle cx="72.4" cy="7.6" r="0.35" fill="#f0f2f5"/>
        </g>
        <path d="M75.5 8 L83 7 L83 10 L75.5 10.5 Z" fill="#1ba3a9" stroke="#1ba3a9" stroke-width=".6" stroke-linejoin="round"/>
        <path d="M76 9.4 L82.4 9" stroke="#04101a" stroke-width=".5" opacity=".5"/>
        <g transform="translate(86, 10)">
          <line x1="0" y1="0" x2="-4" y2="-3" stroke="#1ba3a9" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="6" cy="3" r="6" fill="rgba(27,163,169,.12)" stroke="#1ba3a9" stroke-width="1.4"/>
          <line x1="3" y1="1.5" x2="6" y2="1.5" stroke="#f0f2f5" stroke-width=".7" stroke-linecap="round" opacity=".7"/>
        </g>
        <g>
          <line x1="30" y1="52" x2="30" y2="57" stroke="#f0f2f5" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M25 58 L35 58 L30 55 Z" fill="#1ba3a9" stroke="#1ba3a9" stroke-width=".6" stroke-linejoin="round"/>
          <line x1="26.5" y1="57.6" x2="30" y2="55.4" stroke="#04101a" stroke-width=".5" opacity=".55"/>
          <line x1="33.5" y1="57.6" x2="30" y2="55.4" stroke="#04101a" stroke-width=".5" opacity=".55"/>
          <line x1="42" y1="52" x2="42" y2="57" stroke="#f0f2f5" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M37 58 L47 58 L42 55 Z" fill="#1ba3a9" stroke="#1ba3a9" stroke-width=".6" stroke-linejoin="round"/>
          <line x1="38.5" y1="57.6" x2="42" y2="55.4" stroke="#04101a" stroke-width=".5" opacity=".55"/>
          <line x1="45.5" y1="57.6" x2="42" y2="55.4" stroke="#04101a" stroke-width=".5" opacity=".55"/>
        </g>
      </g>
    </g>
  </g>
</svg>
