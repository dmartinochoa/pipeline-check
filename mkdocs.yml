site_name: Pipeline-Check
site_description: CI/CD Security Posture Scanner — scores AWS, Terraform, CloudFormation, GitHub Actions, GitLab CI, Azure DevOps, Bitbucket Pipelines, Jenkins, CircleCI, Cloud Build, Buildkite, Drone CI, Tekton, Argo Workflows, Dockerfile, Kubernetes manifests, Helm charts, OCI image manifests, SCM repo posture, npm and pypi dependency files against the OWASP Top 10 CI/CD Risks plus 14 other compliance frameworks.
site_url: https://dmartinochoa.github.io/pipeline-check/
repo_url: https://github.com/dmartinochoa/pipeline-check
repo_name: dmartinochoa/pipeline-check
edit_uri: edit/master/docs/
copyright: MIT-licensed. Built with MkDocs Material.

docs_dir: docs

exclude_docs: |
  /README.md

theme:
  name: material
  language: en
  # Lives inside docs/ (mkdocs auto-skips paths beginning with `_`
  # during the build, so the templates aren't published as pages).
  custom_dir: docs/_overrides
  # No topbar logo: the wordmark "Pipeline-Check" carries the brand
  # in the chrome. Favicon (browser tab icon) keeps the goose SVG.
  favicon: logo.svg
  # ``font: false`` disables Material's auto-injected Google Fonts
  # link. The Material macro requests static weight stops only
  # (300/400/700), which collapses the variable-axis advantages of
  # Mona Sans and JetBrains Mono — ``font-weight: 720`` snaps to 700.
  # We load both faces via the css2 variable URL in
  # ``docs/_overrides/main.html`` instead, which exposes the full
  # wght axis (200..900) so the design system can actually use the
  # 540 / 620 / 720 stops it asks for. ``font-display: swap`` is
  # baked into the css2 endpoint so text is visible immediately
  # rather than blocking on font load.
  font: false
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    scheme: slate
    primary: custom
    accent: custom
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra_css:
  - stylesheets/extra.css

extra_javascript:
  # Click-to-sort on every <table> inside <article>. Self-hosted (no
  # CDN call) so the docs site stays consistent with the no-telemetry
  # claim on the home page. Tables can opt out via class="no-sort".
  - javascripts/tablesort.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dmartinochoa/pipeline-check
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pipeline-check/

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: dmartinochoa
      repo: pipeline-check
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

hooks:
  # Templates `{{ version }}` from `pipeline_check.__version__` into
  # docs at build time. Was hardcoded; drifted between v0.3.0 and
  # v0.3.3 across release cycles.
  - hooks/mkdocs_version.py
  # Templates `{{ standards.<name>.checks }}` / `{{ standards.<name>.controls }}`
  # tokens from the live standards data modules. Used by the
  # standards index to show per-framework coverage counts inline.
  - hooks/mkdocs_standards_stats.py
  # Templates `{{ providers.<name>.checks }}` tokens from the live
  # rule registries under pipeline_check/core/checks/<name>/rules/.
  # Used by the providers index to render per-provider check counts
  # without hard-coding them (the index card content can't drift).
  - hooks/mkdocs_provider_stats.py
  # Mirrors pipeline_check/core/_design_tokens.css into
  # docs/stylesheets/_design_tokens.css so the package file stays
  # the single source of truth for the severity / grade / surface
  # palette shared by the HTML report and the docs site.
  - hooks/mkdocs_design_tokens.py

nav:
  # Six top-level tabs grouped by user intent. Previous layout exposed
  # ~15 tabs (one per page), which overflowed the Material tab bar and
  # made the site read as a flat dump. Grouping:
  #   Home             entry point
  #   Getting started  "how do I run / configure / gate / read output"
  #   Coverage         "does it scan my stack / fit my compliance ask"
  #   Concepts         scoring, threat model, attack-chain framing
  #   Integrations     MCP server + VS Code extension
  #   Contributing     developer audience (architecture + add-a-*)
  - Home: index.md
  - Getting started:
      - Usage: usage.md
      - Configuration: config.md
      - CI gate: ci_gate.md
      - PR diff: pr_diff.md
      - Output: output.md
      - Stability: stability.md
  - Coverage:
      - Providers:
          - Overview: providers/README.md
          - AWS: providers/aws.md
          - Terraform: providers/terraform.md
          - CloudFormation: providers/cloudformation.md
          - GitHub Actions: providers/github.md
          - GitLab CI: providers/gitlab.md
          - Bitbucket Pipelines: providers/bitbucket.md
          - Azure DevOps: providers/azure.md
          - Jenkins: providers/jenkins.md
          - CircleCI: providers/circleci.md
          - Google Cloud Build: providers/cloudbuild.md
          - Buildkite: providers/buildkite.md
          - Drone CI: providers/drone.md
          - Tekton: providers/tekton.md
          - Argo Workflows: providers/argo.md
          - Dockerfile: providers/dockerfile.md
          - Kubernetes: providers/kubernetes.md
          - Helm: providers/helm.md
          - OCI image manifest: providers/oci.md
          - SCM posture:
              - SCM posture (GitHub / GitLab / Bitbucket): providers/scm.md
          - Package registries:
              - Overview: providers/registries.md
              - npm: providers/npm.md
              - PyPI: providers/pypi.md
              - Maven: providers/maven.md
              - NuGet: providers/nuget.md
      - Standards:
          - Overview: standards/README.md
          - OWASP Top 10 CI/CD: standards/owasp_cicd_top_10.md
          - CIS AWS Foundations: standards/cis_aws_foundations.md
          - CIS GitHub Benchmark: standards/cis_github.md
          - CIS Kubernetes Benchmark: standards/cis_kubernetes.md
          - CIS Supply Chain: standards/cis_supply_chain.md
          - NIST SSDF (800-218): standards/nist_ssdf.md
          - NIST 800-53: standards/nist_800_53.md
          - NIST 800-190: standards/nist_800_190.md
          - NIST CSF 2.0: standards/nist_csf_2.md
          - SLSA: standards/slsa.md
          - PCI DSS v4.0: standards/pci_dss_v4.md
          - ESF Supply Chain: standards/esf_supply_chain.md
          - OpenSSF Scorecard: standards/openssf_scorecard.md
          - S2C2F: standards/s2c2f.md
          - SOC 2: standards/soc2.md
      - Comparison: comparison.md
      - GOAT bench: goat_bench.md
  - Concepts:
      - Scoring model: scoring_model.md
      - Threat model: threatmodel.md
      - Attack chains: attack_chains.md
  - Integrations:
      - MCP: mcp.md
      - VS Code extension: vscode.md
  - Contributing:
      - Architecture: architecture.md
      - Adding a rule: writing_a_rule.md
      - Adding an attack chain: writing_a_chain.md
      - Adding a provider: writing_a_provider.md
      - Writing a custom rule: writing_a_custom_rule.md
