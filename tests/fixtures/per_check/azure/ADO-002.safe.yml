jobs:
  - job: Build
    steps:
      # Safe: the untrusted macro expands into an env-var value, and the
      # script reads it as ``$BRANCH``. ADO never splices the macro text
      # into the script body, so a quote in the branch name can't break out.
      - script: echo "$BRANCH"
        env:
          BRANCH: $(Build.SourceBranchName)
