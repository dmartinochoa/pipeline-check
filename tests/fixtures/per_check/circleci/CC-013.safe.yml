version: 2.1
jobs:
  build:
    docker: [{ image: cimg/base:stable }]
    steps: [checkout]
  deploy:
    docker: [{ image: cimg/base:stable }]
    steps:
      - checkout
      - run: ./scripts/deploy.sh
workflows:
  main:
    jobs:
      - build
      - deploy:
          requires: [build]
          filters:
            branches:
              only: [main]
