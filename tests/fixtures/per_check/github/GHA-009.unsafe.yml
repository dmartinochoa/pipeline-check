name: ingest
on:
  workflow_run:
    workflows: ['Build']
    types: [completed]
permissions: { contents: read }
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e
        with:
          name: build-output
          run-id: ${{ github.event.workflow_run.id }}
      - run: ./build-output/install.sh
