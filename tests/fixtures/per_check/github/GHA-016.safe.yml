name: build
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -o install.sh https://example.com/install.sh
          slsa-verifier verify-artifact install.sh \
            --provenance-path install.sh.intoto.jsonl \
            --source-uri github.com/example/install
          bash install.sh
