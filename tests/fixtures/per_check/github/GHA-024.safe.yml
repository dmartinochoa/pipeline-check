name: release
on:
  push:
    tags: ['v*']
permissions:
  id-token: write
  contents: read
  attestations: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - run: docker build -t app:$GITHUB_SHA .
      - run: docker push app:$GITHUB_SHA
      - uses: actions/attest-build-provenance@c4fbc648846ca6f503a13a2281a5e7b98aa57202
        with:
          subject-name: ghcr.io/example/app
          subject-digest: sha256:${{ steps.build.outputs.digest }}
