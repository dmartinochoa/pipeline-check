name: ci
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm secret is set
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          if [ -n "$API_TOKEN" ]; then
            echo "API_TOKEN is set"
          else
            echo "API_TOKEN is unset"
          fi
