name: integration
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      registry:
        image: ghcr.io/example/private:1.0@sha256:a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
        credentials:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: make integration
