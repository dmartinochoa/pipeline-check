name: overprovisioned-secret
on: push
permissions:
  contents: read
jobs:
  ship:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - run: './test.sh'
      - run: 'curl -fsS -H "Authorization: Bearer $DEPLOY_TOKEN" https://api.example.com/deploy'
