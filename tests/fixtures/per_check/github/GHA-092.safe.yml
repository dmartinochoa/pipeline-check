name: gha-092-safe-single-read
on: pull_request_target
permissions:
  contents: read
jobs:
  review-and-build:
    runs-on: ubuntu-latest
    steps:
      # Capture once into a step output. Both the gate and the
      # checkout use this resolved value, so no race window exists.
      - id: snap
        run: echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
      - name: Review gate
        run: ./review-gate.sh "${{ steps.snap.outputs.sha }}"
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ steps.snap.outputs.sha }}
      - run: ./build.sh
