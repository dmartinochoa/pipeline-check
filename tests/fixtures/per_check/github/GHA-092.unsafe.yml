name: gha-092-unsafe-toctou
on: pull_request_target
permissions:
  contents: read
jobs:
  gate-and-build:
    runs-on: ubuntu-latest
    steps:
      # LIVE read: gh pr view fetches the CURRENT head, which a
      # contributor can force-push after this gate runs.
      - id: gate
        env:
          PR: ${{ github.event.number }}
        run: |
          LIVE=$(gh pr view "$PR" --json headRefOid -q .headRefOid)
          ./review-gate.sh "$LIVE"
      # Second, independent read: the checkout pins to the payload SHA.
      # A force-push between the live read and this fetch desyncs the
      # gate decision from what actually gets built.
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: ./build.sh
