# Argo Workflow that satisfies every ARGO-* check.
---
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: build-and-deploy
  namespace: argo
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-runner
  activeDeadlineSeconds: 3600
  # ARGO-013: opt out of SA-token automount at the workflow level.
  # Templates that genuinely need K8s API access can set
  # automountServiceAccountToken: true on themselves only.
  automountServiceAccountToken: false
  arguments:
    parameters:
      - name: ref
        value: "main"
  templates:
    - name: main
      inputs:
        parameters:
          - name: ref
      script:
        # ARGO-001: digest-pinned image.
        image: alpine@sha256:c5b1261d6d3e43071626931fc004f70149baeba2c8ec672bd4f27761f8e1ad6b
        # ARGO-002: hardened securityContext.
        securityContext:
          privileged: false
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        env:
          # Parameter received via env, then quoted in the script body.
          - name: REF
            value: "{{inputs.parameters.ref}}"
          - name: TOKEN
            valueFrom:
              secretKeyRef:
                name: deploy-secrets
                key: token
        command: [bash]
        # ARGO-005 / ARGO-008: parameter referenced quoted, no curl-pipe.
        # ARGO-009 / ARGO-010 / ARGO-011 / ARGO-012: this template builds
        # an image, scans for vulns, generates an SBOM, signs the
        # result, and attests provenance before pushing.
        source: |
          set -e
          echo "Building $REF"
          curl -fsSLO https://example.com/install.sh
          curl -fsSLO https://example.com/install.sh.sha256
          sha256sum -c install.sh.sha256
          bash install.sh
          docker build -t internal/app:$REF .
          trivy image --severity HIGH,CRITICAL --exit-code 1 internal/app:$REF
          syft internal/app:$REF -o cyclonedx-json > sbom.json
          cosign sign --yes internal/app:$REF
          cosign attest --predicate provenance.json --type slsaprovenance internal/app:$REF
          docker push internal/app:$REF
