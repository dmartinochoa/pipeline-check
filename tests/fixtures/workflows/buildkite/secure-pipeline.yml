# Buildkite pipeline that satisfies every BK-* check.

env:
  # Real values come from agent secrets hooks at runtime; the
  # interpolation form keeps pipeline.yml committable.
  AWS_REGION: us-east-1

agents:
  queue: default

steps:
  - label: ":docker: Build image"
    timeout_in_minutes: 30
    # BK-001: plugin pinned to an exact semver tag.
    plugins:
      - docker-compose#v4.13.0:
          run: app
    # BK-003: branch name passed quoted, single-token. BK-005: no
    # --privileged. BK-008: no TLS bypass flags.
    command: |
      branch="$BUILDKITE_BRANCH"
      ./scripts/build.sh --branch "$branch"

  - label: ":mag: Vuln scan"
    timeout_in_minutes: 10
    # BK-012: trivy scans the source / image for known CVEs.
    command: |
      trivy fs --severity HIGH,CRITICAL --exit-code 1 .
      trivy image --severity HIGH,CRITICAL --exit-code 1 myapp:fixed-tag

  - label: ":package: SBOM + sign + provenance"
    timeout_in_minutes: 15
    # BK-009: cosign signs the published image.
    # BK-010: syft writes a CycloneDX SBOM.
    # BK-011: cosign attest records the build provenance.
    command: |
      syft myapp:fixed-tag -o cyclonedx-json > sbom.json
      cosign sign --yes myapp:fixed-tag
      cosign attest --predicate provenance.json --type slsaprovenance myapp:fixed-tag
      buildkite-agent artifact upload sbom.json

  - label: ":package: Install tooling"
    timeout_in_minutes: 10
    # BK-004: download, verify, then execute (no curl|sh).
    command: |
      curl -fsSLO https://example.com/install.sh
      sha256sum -c install.sh.sha256
      bash install.sh

  - label: ":hammer: Integration tests"
    timeout_in_minutes: 60
    command: make integration-test

  # BK-007: manual block before the deploy step.
  - block: "Deploy to production?"

  - label: ":rocket: Deploy production"
    timeout_in_minutes: 20
    # BK-013: branches: restricts the deploy to release branches only,
    # so a feature-branch PR can't accidentally promote to prod.
    branches: "main release/*"
    command: |
      kubectl apply -f deploy/prod
      aws ecs update-service --cluster prod --service web
