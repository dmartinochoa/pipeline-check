# Hardened equivalent of insecure-release.yml — every GHA-* check passes.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: 20

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: arn:aws:iam::123456789012:role/release-oidc
          aws-region: us-east-1

      - name: Install cosign
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e

      - name: Generate SBOM
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a
        with:
          format: cyclonedx-json

      - name: Vulnerability scan
        run: trivy fs --severity HIGH .

      # GHA-021 safe: lockfile-enforcing install command.
      - name: Install dependencies
        run: npm ci

      - name: Publish
        env:
          TAG: ${{ github.ref_name }}
        run: |
          npm run deploy -- --tag "$TAG"
          cosign attest --yes --predicate provenance.intoto.jsonl --type slsaprovenance "registry.example.com/app" && cosign sign --yes "ghcr.io/example/app:$TAG"
