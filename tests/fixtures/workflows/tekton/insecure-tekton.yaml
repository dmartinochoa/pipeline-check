# Tekton manifest exhibiting every TKN-* failure mode. Combines a
# Task that triggers the Task-only rules with a PipelineRun that
# triggers the Run-only rules.
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-and-deploy
  namespace: ci
spec:
  # TKN-005: literal token-shaped secret in a param default.
  params:
    - name: deploy-token
      type: string
      default: "ghp_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"  # checkov:skip=CKV_SECRET_2 test fixture
    - name: ref
      type: string
      default: "main"
  # TKN-004: hostPath volume.
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
  # TKN-013: privileged sidecar (docker-in-docker) running as root.
  sidecars:
    - name: docker-daemon
      image: docker:24-dind
      securityContext:
        privileged: true
        runAsNonRoot: false
  steps:
    - name: build
      # TKN-001: tag-only image, no @sha256 digest.
      image: alpine:3.18
      # TKN-015: workspace subPath interpolates a Task parameter,
      # so a pusher-controlled value can traverse outside the
      # shared workspace mount (``../../`` in ``$(params.ref)``).
      workspaces:
        - name: source
          subPath: $(params.ref)
      # TKN-002: privileged step running as root.
      securityContext:
        privileged: true
        runAsNonRoot: false
      # TKN-005 (secondary): literal-secret env value.
      env:
        - name: AWS_ACCESS_KEY_ID
          value: "AKIAZ3MHALF2TESTHIJK"  # checkov:skip=CKV_SECRET_2 test fixture
      # TKN-003 + TKN-008: $(params.ref) inlined unquoted, plus
      # curl-pipe-shell in the same script body.
      # TKN-009 / TKN-010 / TKN-011 / TKN-012 also fire on this
      # Task because it builds & pushes a container without any
      # signing / SBOM / SLSA provenance / vuln scanning step.
      script: |
        set -e
        echo Building $(params.ref)
        curl https://example.com/install.sh | sh
        npm install
        pip install --trusted-host pypi.internal package
        docker build -t internal/app:latest .
        docker push internal/app:latest
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-deploy-run
  namespace: ci
spec:
  # TKN-006: no timeout / timeouts block.
  # TKN-007: no serviceAccountName (defaults to "default").
  # TKN-016: pipelineRef fetched from a mutable git branch (unpinned).
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/org/pipelines
      - name: revision
        value: main
      - name: pathInRepo
        value: build-and-deploy.yaml
---
# TAINT-006: cross-task results-forwarding taint flow. The
# ``extract`` task pipes ``$(params.title)`` into a result
# file; the ``deploy`` task receives the result as its own
# param via ``$(tasks.extract.results.clean)`` and references
# the param unquoted in its script. TKN-003 catches the
# producer's inner interpolation; TAINT-006 catches the
# cross-task injection at the consumer.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-deploy-pipeline
  namespace: ci
spec:
  params:
    - name: pr-title
  tasks:
    - name: extract
      params:
        - name: title
          value: $(params.pr-title)
      taskSpec:
        params:
          - name: title
        results:
          - name: clean
        steps:
          - name: extract
            image: alpine
            script: |
              echo "$(params.title)" > $(results.clean.path)
    - name: deploy
      runAfter: [extract]
      params:
        - name: title
          value: $(tasks.extract.results.clean)
      taskSpec:
        params:
          - name: title
        steps:
          - name: deploy
            image: alpine
            script: |
              echo Deploying release for $(params.title)
